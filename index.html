<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SANVI — El Cuadre, Camión &amp; Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   EL CUADRE — DESIGN TOKENS
   Paleta inspirada en bitácoras de carga, tickets de pesaje
   y cajas de banano. Modo oscuro para uso en ruta / madrugada.
   ============================================================ */
:root{
  --bg:#1B201C;
  --surface:#242B25;
  --surface-2:#2F392F;
  --surface-3:#384338;
  --border:#3C463C;
  --paper:#F4EFE2;
  --paper-text:#2A2D24;
  --paper-muted:#7C7768;
  --text:#F4EFE2;
  --text-dim:#AEBBAC;
  --text-faint:#7E8C7C;
  --yellow:#F4B400;
  --yellow-ink:#4A3700;
  --green:#7FB069;
  --green-deep:#4F7942;
  --red:#E2562F;
  --red-deep:#9C3B1C;
  --blue:#6FA0B4;
  --blue-deep:#3E6878;
  --radius-lg:16px;
  --radius:12px;
  --radius-sm:8px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button,input,select,textarea{font-family:inherit;}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:.01em;margin:0;}
.mono{font-family:var(--font-mono);}
.hidden{display:none !important;}
a{color:var(--yellow);}

/* ---------- App shell ---------- */
.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}
.app-header{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.brand{display:flex;flex-direction:column;line-height:1;}
.brand-name{
  font-family:var(--font-display);font-size:22px;font-weight:700;
  letter-spacing:.06em;color:var(--yellow);
}
.brand-tag{font-size:10.5px;color:var(--text-faint);letter-spacing:.04em;margin-top:2px;}
.icon-btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;position:relative;
}
.icon-btn:active{background:var(--surface-3);}
.icon-btn .dot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;
  background:var(--red);border:1.5px solid var(--bg);
}

/* Period switcher */
.period-switch{display:flex;align-items:center;gap:8px;}
.period-modes{display:flex;background:var(--surface-2);border-radius:999px;padding:3px;flex-shrink:0;}
.period-mode{
  border:none;background:transparent;color:var(--text-dim);
  font-family:var(--font-display);font-size:12px;letter-spacing:.06em;
  padding:6px 12px;border-radius:999px;cursor:pointer;text-transform:uppercase;
}
.period-mode.active{background:var(--yellow);color:var(--yellow-ink);font-weight:700;}
.period-nav{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  background:var(--surface-2);border-radius:999px;padding:4px 6px;
}
.period-nav button{
  border:none;background:transparent;color:var(--text);font-size:18px;
  width:28px;height:28px;border-radius:50%;cursor:pointer;line-height:1;
}
.period-nav button:active{background:var(--surface-3);}
.period-label{
  font-family:var(--font-mono);font-size:12.5px;font-weight:700;color:var(--text);
  text-align:center;flex:1;letter-spacing:.02em;
}

/* ---------- Main view area ---------- */
.view-container{
  flex:1;padding:14px 16px calc(96px + var(--safe-bottom));
  display:flex;flex-direction:column;gap:14px;
}
.view-title{
  font-size:13px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;
  margin:4px 0 -4px;display:flex;align-items:center;justify-content:space-between;
}
.section-label{
  font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.12em;
  margin:6px 0 -4px;
}

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  max-width:480px;margin:0 auto;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:6px 4px calc(6px + var(--safe-bottom));
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--text-faint);font-size:10.5px;
  letter-spacing:.04em;padding:6px 2px;cursor:pointer;border-radius:10px;
  font-family:var(--font-body);font-weight:600;text-transform:uppercase;
}
.nav-item svg{width:21px;height:21px;}
.nav-item.active{color:var(--yellow);}
.nav-item:active{background:var(--surface-2);}

/* ---------- Generic cards ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;
}
.hero-card{
  background:linear-gradient(155deg,var(--surface-3),var(--surface));
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px 18px 16px;position:relative;overflow:hidden;
}
.hero-label{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px;}
.hero-value{font-family:var(--font-mono);font-size:34px;font-weight:700;letter-spacing:-.01em;}
.hero-value.pos{color:var(--green);}
.hero-value.neg{color:var(--red);}
.hero-sub{font-size:12px;color:var(--text-dim);margin-top:6px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 13px;
}
.stat-card .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;line-height:1.3;}
.stat-card .val{font-family:var(--font-mono);font-size:19px;font-weight:700;margin-top:5px;}
.stat-card .val.pos{color:var(--green);}
.stat-card .val.neg{color:var(--red);}
.stat-card .sub{font-size:10.5px;color:var(--text-dim);margin-top:3px;}

/* Saldos de caja */
.caja-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.caja-card{
  border-radius:var(--radius);padding:12px 13px;border:1px solid var(--border);
}
.caja-card.efectivo{background:linear-gradient(155deg,#3a4a32,var(--surface));}
.caja-card.banco{background:linear-gradient(155deg,#2e4650,var(--surface));}
.caja-card .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);}
.caja-card .val{font-family:var(--font-mono);font-size:20px;font-weight:700;margin-top:4px;}

/* ---------- Alert banners ---------- */
.alert{
  display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:var(--radius);
  font-size:12.5px;line-height:1.4;border:1px solid;
}
.alert.warn{background:rgba(244,180,0,.08);border-color:rgba(244,180,0,.35);color:var(--yellow);}
.alert.danger{background:rgba(226,86,47,.08);border-color:rgba(226,86,47,.35);color:#FF8A65;}
.alert .a-icon{flex-shrink:0;margin-top:1px;}
.alert b{color:var(--text);}

/* ---------- Ticket stub (signature component) ---------- */
.ticket{
  display:flex;background:var(--paper);color:var(--paper-text);
  border-radius:var(--radius);overflow:hidden;position:relative;
  box-shadow:0 1px 0 rgba(0,0,0,.15);
}
.ticket-main{flex:1;padding:11px 12px;min-width:0;}
.ticket-side{
  width:104px;flex-shrink:0;padding:11px 10px;display:flex;flex-direction:column;
  align-items:flex-end;justify-content:space-between;position:relative;
  border-left:2px dashed rgba(42,45,36,.25);
}
.ticket-side::before,.ticket-side::after{
  content:"";position:absolute;left:-7px;width:14px;height:14px;border-radius:50%;
  background:var(--bg);
}
.ticket-side::before{top:-7px;}
.ticket-side::after{bottom:-7px;}
.t-date{font-size:10.5px;color:var(--paper-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.t-title{font-family:var(--font-display);font-size:14.5px;font-weight:600;margin-top:2px;line-height:1.25;}
.t-meta{font-size:11.5px;color:var(--paper-muted);margin-top:3px;line-height:1.4;}
.t-amount{font-family:var(--font-mono);font-size:16px;font-weight:700;}
.t-amount.neg{color:var(--red-deep);}
.t-amount.pos{color:var(--green-deep);}
.t-balance{font-size:10px;color:var(--paper-muted);margin-top:2px;text-align:right;}
.stamp{
  font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;border:2px solid currentColor;border-radius:4px;
  padding:2px 6px;transform:rotate(-6deg);display:inline-block;
}
.stamp.cobrado{color:var(--green-deep);}
.stamp.por-cobrar{color:var(--red-deep);}
.stamp.mora{color:var(--red-deep);background:rgba(156,59,28,.12);}

/* ---------- Lists / rows ---------- */
.list{display:flex;flex-direction:column;gap:8px;}
.row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:11px 12px;
}
.row .r-main{min-width:0;flex:1;}
.row .r-title{font-size:13.5px;font-weight:600;}
.row .r-sub{font-size:11.5px;color:var(--text-faint);margin-top:2px;}
.row .r-val{font-family:var(--font-mono);font-weight:700;font-size:14px;flex-shrink:0;}
.row .r-val.pos{color:var(--green);}
.row .r-val.neg{color:var(--red);}

/* ---------- Buttons ---------- */
.btn{
  font-family:var(--font-display);font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  font-size:13px;border-radius:var(--radius);border:1px solid transparent;
  padding:11px 14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;
}
.btn-primary{background:var(--yellow);color:var(--yellow-ink);}
.btn-secondary{background:var(--surface-2);color:var(--text);border-color:var(--border);}
.btn-danger{background:rgba(226,86,47,.12);color:#FF8A65;border-color:rgba(226,86,47,.35);}
.btn-ghost{background:transparent;color:var(--text-dim);border-color:var(--border);}
.btn-sm{padding:7px 10px;font-size:11px;width:auto;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}
.btn:active{transform:scale(.98);}

.icon-action{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.icon-action.call{background:rgba(127,176,105,.14);border-color:rgba(127,176,105,.4);color:var(--green);}
.icon-action.msg{background:rgba(111,160,180,.14);border-color:rgba(111,160,180,.4);color:var(--blue);}

/* FAB */
.fab{
  position:fixed;bottom:calc(78px + var(--safe-bottom));right:calc(50% - 240px + 18px);
  z-index:25;background:var(--yellow);color:var(--yellow-ink);border:none;
  width:54px;height:54px;border-radius:50%;font-size:26px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}
@media (max-width:516px){
  .fab{right:18px;}
}
.fab:active{transform:scale(.95);}

/* ---------- Forms ---------- */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.field input,.field select,.field textarea{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  border-radius:var(--radius-sm);padding:11px 12px;font-size:14.5px;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:2px solid var(--yellow);outline-offset:1px;
}
.field textarea{resize:vertical;min-height:54px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.field-hint{font-size:11px;color:var(--text-faint);}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.seg button{
  flex:1;background:transparent;border:none;color:var(--text-dim);padding:10px;font-weight:700;
  font-family:var(--font-display);letter-spacing:.06em;font-size:12.5px;text-transform:uppercase;cursor:pointer;
}
.seg button.active{background:var(--yellow);color:var(--yellow-ink);}
.seg button.active.danger{background:var(--red);color:#fff;}
.cactus-add{display:flex;gap:8px;margin-top:6px;}
.cactus-add input{flex:1;}
.computed-line{
  display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-dim);
  padding:6px 0;border-top:1px dashed var(--border);margin-top:6px;
}
.computed-line b{color:var(--text);font-family:var(--font-mono);}

/* ---------- Medidor de combustible (aguja arrastrable) ---------- */
.fuel-gauge-row{display:flex;gap:10px;margin-bottom:8px;}
.fuel-gauge{
  flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 8px 10px;text-align:center;
}
.fg-svg{width:100%;height:auto;touch-action:none;cursor:grab;}
.fg-svg:active{cursor:grabbing;}
.fg-title{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.fg-label{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--yellow);margin-top:1px;}

/* ---------- Badges chicos (carguero, factura, semáforo) ---------- */
.mini-badge{
  display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:999px;letter-spacing:.02em;
}
.mini-badge.pendiente{background:rgba(244,180,0,.14);color:var(--yellow);}
.mini-badge.pagado{background:rgba(127,176,105,.14);color:var(--green);}
.mini-badge.info{background:var(--surface-3);color:var(--text-dim);}
.semaforo-dot{font-size:9px;margin-right:2px;}

/* ---------- Dashboard: bloques de 4 (item 28) ---------- */
.dash-blocks{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dash-block{
  border-radius:var(--radius);padding:12px 13px;border:1px solid var(--border);
}
.dash-block .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;}
.dash-block .val{font-family:var(--font-mono);font-size:18px;font-weight:700;margin-top:5px;}
.dash-block .sub{font-size:10px;color:var(--text-dim);margin-top:3px;}
.dash-block.tienes{background:linear-gradient(155deg,#3a4a32,var(--surface));}
.dash-block.deben{background:linear-gradient(155deg,#2e4650,var(--surface));}
.dash-block.no-tuyo{background:linear-gradient(155deg,#4a3d28,var(--surface));}
.dash-block.debes{background:linear-gradient(155deg,#4a2e28,var(--surface));}

/* ---------- Vista lado a lado (este mes / próximo mes) ---------- */
.side-by-side{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 13px;}
.sbs-card .lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;}
.sbs-card .val{font-family:var(--font-mono);font-size:17px;font-weight:700;margin-top:5px;}

/* ---------- Modal sheet ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--bg);border:1px solid var(--border);border-bottom:none;
  border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:88vh;
  display:flex;flex-direction:column;animation:slideUp .18s ease-out;
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.modal-head h3{font-size:17px;}
.modal-body{padding:14px 16px;overflow-y:auto;flex:1;}
.modal-foot{padding:12px 16px calc(14px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:8px;}
.modal-close{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;
}

/* ---------- Empty state ---------- */
.empty{
  text-align:center;padding:34px 16px;color:var(--text-faint);font-size:13px;
  border:1px dashed var(--border);border-radius:var(--radius);
}
.empty b{display:block;color:var(--text-dim);font-family:var(--font-display);font-size:15px;margin-bottom:4px;letter-spacing:.04em;}

/* ---------- Tabs ---------- */
.tabbar{display:flex;gap:6px;background:var(--surface-2);border-radius:999px;padding:3px;}
.tabbar button{
  flex:1;border:none;background:transparent;color:var(--text-dim);padding:8px 6px;
  border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.04em;cursor:pointer;
  font-family:var(--font-display);text-transform:uppercase;
}
.tabbar button.active{background:var(--yellow);color:var(--yellow-ink);}

/* ---------- Mas (menu) ---------- */
.menu-list{display:flex;flex-direction:column;gap:8px;}
.menu-item{
  display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;cursor:pointer;
}
.menu-item .m-icon{
  width:38px;height:38px;border-radius:10px;background:var(--surface-2);display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.menu-item .m-text b{font-size:14px;display:block;}
.menu-item .m-text span{font-size:11.5px;color:var(--text-faint);}
.menu-item .m-arrow{margin-left:auto;color:var(--text-faint);}
.subview-head{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.back-btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}

/* ---------- Mini chart (sin librerías externas) ---------- */
.chart-wrap{position:relative;}
.vbars{display:flex;align-items:flex-end;gap:7px;height:128px;padding-top:4px;}
.vbars .vb-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;min-width:0;}
.vbars .vb-track{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative;}
.vbars .vb-fill{width:60%;margin:0 auto;border-radius:4px 4px 2px 2px;min-height:3px;}
.vbars .vb-fill.pos{background:var(--green);}
.vbars .vb-fill.neg{background:var(--red);}
.vbars .vb-zero{position:absolute;left:0;right:0;bottom:0;border-top:1px solid var(--border);}
.vbars .vb-label{font-size:9.5px;color:var(--text-faint);margin-top:6px;font-family:var(--font-mono);letter-spacing:.02em;}
.vbars .vb-val{font-size:8.5px;color:var(--text-dim);margin-bottom:2px;font-family:var(--font-mono);white-space:nowrap;}

.hbars{display:flex;flex-direction:column;gap:10px;}
.hbars .hb-row{display:flex;align-items:center;gap:10px;}
.hbars .hb-label{font-size:11.5px;color:var(--text-dim);width:84px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hbars .hb-track{flex:1;background:var(--surface-2);border-radius:5px;height:16px;overflow:hidden;}
.hbars .hb-fill{height:100%;background:var(--yellow);border-radius:5px;}
.hbars .hb-val{font-family:var(--font-mono);font-size:11px;color:var(--text);width:64px;text-align:right;flex-shrink:0;}

/* ---------- Lock screen ---------- */
.lock-screen{
  position:fixed;inset:0;background:var(--bg);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;
}
.lock-screen .brand-name{font-size:30px;}
.pin-dots{display:flex;gap:14px;}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--text-faint);}
.pin-dots span.filled{background:var(--yellow);border-color:var(--yellow);}
.pinpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:240px;}
.pinpad button{

}

.sync-pill.busy{color:var(--yellow);}

.sync-pill.error{color:var(--red);}

/* ---------- toast ---------- */

  background:var(--surface-3);color:var(--text);border:1px solid var(--border);
  padding:9px 16px;border-radius:999px;font-size:12.5px;z-index:60;
  box-shadow:0 4px 14px rgba(0,0,0,.4);
}

<script>
'use strict';
/* ============================================================
   EL CUADRE — Núcleo de datos y utilidades
   ============================================================ */

// ---------- Constantes ----------
const DB_KEY = 'elcuadre_db_v1';
const SCHEMA_VERSION = 2; // v2: costos en ruta, carguero, cuentas por cobrar con semáforo, COSTO/EGRESO
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbyN8_QNyMssdU_IR35rlhYmb1mpmbfkHiq5gGOGrU6MWNbpTyiiSi2CNdzqAgaznzeM/exec';
const SYNC_TOKEN = 'Sanvi1870';
const AUTO_SYNC_ENABLED = true;
const AUTO_SYNC_DEBOUNCE_MS = 1200;

const DEFAULT_CATEGORIES = {
  cargoType: ['Caja de Banano','Cartón','Domicilios/Mudanzas','Otros fletes'],
  origenViaje: ['Me llamó el productor','Me envió un carrero','Yo envié carrero'],
  // grupo: 'camion' (afecta utilidad operativa) | 'personal' (gasto de vida)
  // tipo:  'costo' (ligado directamente a generar un viaje/ingreso) | 'egreso' (no genera ingreso directo)
  expenseCategory: [
    {nombre:'Combustible', grupo:'camion', tipo:'costo'},
    {nombre:'Peajes', grupo:'camion', tipo:'costo'},
    {nombre:'Guardianía/Parqueadero', grupo:'camion', tipo:'egreso'},
    {nombre:'Mantenimiento y Repuestos', grupo:'camion', tipo:'egreso'},
    {nombre:'Accesorios de Sujeción', grupo:'camion', tipo:'egreso'},
    {nombre:'Legales y Fijos', grupo:'camion', tipo:'egreso'},
    {nombre:'Cuota Compañía', grupo:'camion', tipo:'egreso'},
    {nombre:'Préstamos y Deudas', grupo:'personal', tipo:'egreso'},
    {nombre:'Arriendo', grupo:'personal', tipo:'egreso'},
    {nombre:'Comida y Suministros', grupo:'personal', tipo:'egreso'},
    {nombre:'Gastos Personales', grupo:'personal', tipo:'egreso'},
    {nombre:'Comisiones Bancarias', grupo:'personal', tipo:'egreso'},
  ],
  maintenanceZone: ['Motor','Cabina','Cajón','Llantas','Chasis'],
  legalType: ['Matrícula','Renovación de Licencia','Seguro','Multa de Tránsito'],
  establishment: ['Tuti','Tía','Mi Comisariato','Supermaxi','Tienda de Barrio','Restaurante de carretera'],
  gasStation: ['Primax','Petroecuador','Shell','Mobil','Otro'],
  causaMora: ['Cliente no pagó','Falta de caja','Otro'],
  commitmentTemplates: [
    {nombre:'SOAT', categoriaGasto:'Legales y Fijos', frecuencia:'mensual'},
    {nombre:'Matrícula', categoriaGasto:'Legales y Fijos', frecuencia:'mensual'},
    {nombre:'Revisión técnica', categoriaGasto:'Legales y Fijos', frecuencia:'mensual'},
    {nombre:'Mecánico mensual', categoriaGasto:'Mantenimiento y Repuestos', frecuencia:'mensual'},
    {nombre:'Cuota Compañía', categoriaGasto:'Cuota Compañía', frecuencia:'mensual', esCuotaCompania:true},
  ],
};

const PAY_METHODS = ['Efectivo','Transferencia','Tarjeta'];

// ---------- Estado global ----------
let DB = null;
let STATE = {
  view: 'resumen',
  subview: null, // para submenú de "Más": 'productores' | 'reportes' | 'config'
  periodMode: 'semana', // 'semana' | 'mes'
  periodAnio: null,
  periodSemana: null,
  periodMes: null,
};

// ---------- Utilidades fecha / periodo ----------
function pad2(n){ return String(n).padStart(2,'0'); }

function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function parseISO(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}

// Semana ISO-8601 (lunes a domingo, semana 1 = la que contiene el primer jueves del año).
// BUGFIX: el cálculo anterior usaba "día del año / 7" y desfasaba ~1 semana en gran
// parte del año (ej. 22 jun 2026 daba semana 25 en vez de 26).
function getWeekNumber(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7; // lunes=0 ... domingo=6
  d.setUTCDate(d.getUTCDate() - dayNum + 3); // jueves de esta semana
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const firstDayNum = (firstThursday.getUTCDay() + 6) % 7;
  firstThursday.setUTCDate(firstThursday.getUTCDate() - firstDayNum + 3);
  return 1 + Math.round((d - firstThursday) / (7*86400000));
}
// Cuántas semanas ISO tiene un año (52 o 53) — necesario para que la navegación
// de periodos (anterior/siguiente) no se desalinee con getWeekNumber en años de 53 semanas.
function weeksInISOYear(year){
  const p = (y)=> (y + Math.floor(y/4) - Math.floor(y/100) + Math.floor(y/400)) % 7;
  return (p(year)===4 || p(year-1)===3) ? 53 : 52;
}
// Lunes calendario de una semana ISO dada (para calcular rango de fechas del periodo).
function isoWeekStartDate(anio, semana){
  const jan4 = new Date(anio, 0, 4);
  const jan4DayNum = (jan4.getDay() + 6) % 7;
  const week1Monday = new Date(jan4);
  week1Monday.setDate(jan4.getDate() - jan4DayNum);
  const start = new Date(week1Monday);
  start.setDate(week1Monday.getDate() + (semana-1)*7);
  return start;
}

function dateMeta(iso){
  const d = parseISO(iso);
  return { anio: d.getFullYear(), mes: d.getMonth()+1, semana: getWeekNumber(d) };
}

const MES_NOMBRES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function fmtMoney(n){
  n = Number(n)||0;
  const neg = n < 0;
  const abs = Math.abs(n).toFixed(2);
  const parts = abs.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (neg?'-':'') + '$' + parts.join('.');
}

function fmtDateShort(iso){
  const d = parseISO(iso);
  const meses = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  return `${pad2(d.getDate())} ${meses[d.getMonth()]}`;
}

function daysBetween(isoA, isoB){
  const a = parseISO(isoA), b = parseISO(isoB);
  return Math.round((b - a) / 86400000);
}

function uuid(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
}

function nowISO(){ return new Date().toISOString(); }
function touchSettings(){
  if (DB && DB.meta) DB.meta.settingsUpdatedAt = nowISO();
}
function touchCategories(){
  if (DB && DB.meta) DB.meta.categoriesUpdatedAt = nowISO();
}
function markPendingDelete(tableName, id){
  if (!DB.pendingDeletes) DB.pendingDeletes = {};
  if (!Array.isArray(DB.pendingDeletes[tableName])) DB.pendingDeletes[tableName] = [];
  DB.pendingDeletes[tableName].push({ id, deletedAt: nowISO() });
}

// ---------- Persistencia ----------
function defaultDB(){
  return {
    meta: {
      schemaVersion: SCHEMA_VERSION,
      empresaNombre: 'Empresa Única',
      pin: null,
      diasMoraAlerta: 15,
      diasPlazoCobro: 8,
      diasAlertaCarguero: 5,
      capacidadTanqueGalones: 200,
      thresholdEndeudamientoPct: 60,
      settingsUpdatedAt: null,
      categoriesUpdatedAt: null,
      lastSyncAt: null,
      lastSyncStatus: null, // 'ok' | 'error' | null
      lastSyncMessage: '',
    },
    trips: [],
    expenses: [],
    producers: [],
    transfers: [],
    commitments: [],   // deudas (con saldo) y fijos recurrentes (arriendo, etc.)
    maintenance: [],   // mantenimiento preventivo por kilometraje
    categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
    // IDs borrados en este teléfono que todavía no se han reflejado (borrado) en la nube.
    // Sin esto, un registro eliminado localmente "resucita" la próxima vez que se restaura
    // desde la nube, porque el respaldo solo sabe agregar/actualizar filas, no borrarlas.
    pendingDeletes: { trips:[], expenses:[], producers:[], transfers:[], commitments:[], maintenance:[] },
  };
}
// Si la base ya existía antes de añadir un campo nuevo (ej. sincronización),
// esto completa lo que falte sin pisar lo que el usuario ya tenía guardado.
function fillDefaults(db){
  const def = defaultDB();
  db.meta = Object.assign({}, def.meta, db.meta||{});
  ['trips','expenses','producers','transfers','commitments','maintenance'].forEach(k=>{
    if (!Array.isArray(db[k])) db[k] = [];
  });
  db.pendingDeletes = Object.assign({}, def.pendingDeletes, db.pendingDeletes||{});
  Object.keys(def.pendingDeletes).forEach(k=>{ if (!Array.isArray(db.pendingDeletes[k])) db.pendingDeletes[k] = []; });
  db.categories = Object.assign({}, def.categories, db.categories||{});
  if (db.meta.pin && !db.meta.settingsUpdatedAt) db.meta.settingsUpdatedAt = nowISO();
  // Migración: categorías de gasto guardadas antes de la v2 no tienen 'tipo' (COSTO/EGRESO).
  if (Array.isArray(db.categories.expenseCategory)){
    db.categories.expenseCategory.forEach(c=>{
      if (!c.tipo) c.tipo = (c.nombre==='Combustible' || c.nombre==='Peajes') ? 'costo' : 'egreso';
    });
    if (!db.categories.expenseCategory.find(c=>c.nombre==='Cuota Compañía')){
      db.categories.expenseCategory.push({nombre:'Cuota Compañía', grupo:'camion', tipo:'egreso'});
    }
  }
  if (!Array.isArray(db.categories.origenViaje) || !db.categories.origenViaje.length) db.categories.origenViaje = def.categories.origenViaje;
  if (!Array.isArray(db.categories.causaMora) || !db.categories.causaMora.length) db.categories.causaMora = def.categories.causaMora;
  if (!Array.isArray(db.categories.commitmentTemplates) || !db.categories.commitmentTemplates.length) db.categories.commitmentTemplates = def.categories.commitmentTemplates;
  // Migración: viajes guardados antes de la v2 no tienen costos en ruta, carguero, etc.
  db.trips.forEach(t=>{
    if (!t.costosRuta) t.costosRuta = {diesel:0, peaje:0, comida:0, otro:0};
    if (t.carguero===undefined) t.carguero = null; // {nombre, monto, pagado, fechaPago}
    if (!t.origenViaje) t.origenViaje = '';
    if (!Array.isArray(t.serviciosAdicionales)) t.serviciosAdicionales = [];
    if (t.requiereFactura===undefined) t.requiereFactura = false;
    if (t.facturaPct===undefined) t.facturaPct = 0;
    if (!t.combustible) t.combustible = {salida:null, regreso:null};
  });
  // Migración: compromisos guardados antes de la v2 no tienen plazo/clasificación/causa de mora.
  db.commitments.forEach(c=>{
    if (!c.plazo) c.plazo = 'corto';
    if (!c.clasificacion) c.clasificacion = 'egreso';
    if (c.esCuotaCompania===undefined) c.esCuotaCompania = (c.categoriaGasto==='Cuota Compañía');
    if (!Array.isArray(c.historialMora)) c.historialMora = []; // [{fecha, excedente, causa}]
  });
  return db;
}
let dbCorruptionInfo = null; // si loadDB() encuentra datos dañados, queda info aquí para avisar tras el primer render
function loadDB(){
  let raw;
  try { raw = localStorage.getItem(DB_KEY); } catch(e){ raw = null; }
  if (raw){
    try { return fillDefaults(JSON.parse(raw)); }
    catch(e){
      // No descartamos el texto crudo en silencio: lo guardamos aparte por si se puede
      // recuperar a mano más adelante, y dejamos marcado el problema para avisar al
      // usuario apenas la app termine de cargar — abrir con una base vacía sin avisar
      // podría hacer pensar que se perdió todo el negocio.
      let backupKey = null;
      try {
        backupKey = DB_KEY + '_dañado_' + Date.now();
        localStorage.setItem(backupKey, raw);
      } catch(_) { /* si ni el respaldo cabe, seguimos igual */ }
      dbCorruptionInfo = { backupKey, message: (e && e.message) || String(e) };
    }
  }
  return defaultDB();
}
function warnIfDbCorrupted(){
  if (!dbCorruptionInfo) return;
  const info = dbCorruptionInfo;
  dbCorruptionInfo = null; // mostrar una sola vez por sesión
  openModal('⚠️ No se pudo leer tus datos guardados', `
    <p style="font-size:13.5px;color:var(--text-dim);line-height:1.5;">
      El teléfono tenía datos guardados pero estaban dañados y no se pudieron abrir.
      Por seguridad <b>no los borramos</b>: quedaron guardados aparte en este mismo
      navegador${info.backupKey?` (clave técnica: <code style="font-size:11px;">${esc(info.backupKey)}</code>)`:''}.
    </p>
    <p style="font-size:13.5px;color:var(--text-dim);line-height:1.5;margin-top:8px;">
      La app abrió con una base <b>vacía</b> para que puedas seguir trabajando.
      Si configuraste la sincronización, ve a <b>Más → Sincronización</b> y
      usa <b>"Restaurar desde la nube"</b> para recuperar tus datos operativos.
    </p>
  `, `<button class="btn btn-primary" data-action="close-modal">Entendido</button>`);
}

function saveDB(){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
  catch(e){ showToast('No se pudo guardar (almacenamiento lleno)'); }
  if (!syncApplying) scheduleAutoSync();
}

// ---------- Toast ----------
function showToast(msg){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>el.remove(), 2200);
}

// ---------- Periodo: claves, etiquetas, navegación ----------
function periodKey(mode, anio, semana, mes){
  return mode==='semana' ? `${anio}-S${pad2(semana)}` : `${anio}-M${pad2(mes)}`;
}
function currentPeriodKey(){
  return periodKey(STATE.periodMode, STATE.periodAnio, STATE.periodSemana, STATE.periodMes);
}
function currentPeriodLabel(){
  if (STATE.periodMode==='semana') return `Semana ${STATE.periodSemana} · ${STATE.periodAnio}`;
  return `${MES_NOMBRES[STATE.periodMes-1]} ${STATE.periodAnio}`;
}
function initPeriodToNow(){
  const d = new Date();
  STATE.periodAnio = d.getFullYear();
  STATE.periodSemana = getWeekNumber(d);
  STATE.periodMes = d.getMonth()+1;
}
function shiftPeriod(dir){
  if (STATE.periodMode==='semana'){
    let s = STATE.periodSemana + dir;
    let y = STATE.periodAnio;
    if (s < 1){ y -= 1; s = weeksInISOYear(y); }
    if (s > weeksInISOYear(y)){ y += 1; s = 1; }
    STATE.periodSemana = s; STATE.periodAnio = y;
  } else {
    let m = STATE.periodMes + dir;
    let y = STATE.periodAnio;
    if (m < 1){ m = 12; y -= 1; }
    if (m > 12){ m = 1; y += 1; }
    STATE.periodMes = m; STATE.periodAnio = y;
  }
}
// Itera periodos hacia atrás incluyendo el actual: [{key,label,anio,semana,mes}, ...] orden cronológico
function lastNPeriods(n){
  const out = [];
  let anio = STATE.periodAnio, semana = STATE.periodSemana, mes = STATE.periodMes;
  for (let i=0;i<n;i++){
    out.unshift({
      key: periodKey(STATE.periodMode, anio, semana, mes),
      anio, semana, mes,
      label: STATE.periodMode==='semana' ? `S${semana}` : MES_NOMBRES[mes-1].slice(0,3)
    });
    if (STATE.periodMode==='semana'){
      semana -= 1; if (semana < 1){ anio -= 1; semana = weeksInISOYear(anio); }
    } else {
      mes -= 1; if (mes < 1){ mes = 12; anio -= 1; }
    }
  }
  return out;
}

// ---------- Filtrado por periodo ----------
function inPeriod(item, p){
  p = p || STATE;
  if (STATE.periodMode==='semana') return item.anio===p.periodAnio && item.semana===p.periodSemana;
  return item.anio===p.periodAnio && item.mes===p.periodMes;
}
function inPeriodCustom(item, anio, semana, mes){
  if (STATE.periodMode==='semana') return item.anio===anio && item.semana===semana;
  return item.anio===anio && item.mes===mes;
}

// ---------- Categorías helpers ----------
function getExpenseCategory(nombre){
  return DB.categories.expenseCategory.find(c=>c.nombre===nombre);
}
function expenseGrupo(nombre){
  const c = getExpenseCategory(nombre);
  return c ? c.grupo : 'personal';
}
function expenseTipo(nombre){
  const c = getExpenseCategory(nombre);
  return c ? (c.tipo||'egreso') : 'egreso';
}
function addCactusCategory(catKey, value){
  if (!value) return;
  value = value.trim();
  if (!value) return;
  const list = DB.categories[catKey];
  if (catKey==='expenseCategory'){
    if (!list.find(c=>c.nombre.toLowerCase()===value.toLowerCase())){
      list.push({nombre:value, grupo:'personal', tipo:'egreso'});
      touchCategories();
      saveDB();
    }
  } else {
    if (!list.find(c=>c.toLowerCase()===value.toLowerCase())){
      list.push(value);
      touchCategories();
      saveDB();
    }
  }
}

// ---------- Cálculos financieros centrales ----------
function tripSaldoPendiente(t){
  return round2(Math.max(0, (Number(t.valorFlete)||0) + serviciosAdicionalesTotal(t) - (Number(t.anticipo)||0) - (Number(t.descuento)||0)));
}
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
// Escapa HTML para cualquier texto libre que el usuario escribió (nombres, notas, rutas,
// categorías personalizadas, etc.) antes de insertarlo en el DOM. Sin esto, un nombre o nota
// que contenga < > & " podía romper el diseño o, en el peor caso, inyectar HTML/script.
// Se aplica solo al renderizar (no al guardar), así el dato crudo queda intacto en la base
// y en los respaldos/CSV.
function esc(s){
  if (s==null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- Viajes: costos en ruta, servicios adicionales, factura, carguero, utilidad neta ----
function costosRutaTotal(t){
  const c = t.costosRuta || {};
  return round2((Number(c.diesel)||0)+(Number(c.peaje)||0)+(Number(c.comida)||0)+(Number(c.otro)||0));
}
function serviciosAdicionalesTotal(t){
  return round2((t.serviciosAdicionales||[]).reduce((s,x)=>s+(Number(x.valor)||0),0));
}
function costoFacturaTrip(t){
  if (!t.requiereFactura) return 0;
  return round2((Number(t.valorFlete)||0) * ((Number(t.facturaPct)||0)/100));
}
function cargueroMontoTrip(t){
  return (t.carguero && t.carguero.monto) ? round2(Number(t.carguero.monto)||0) : 0;
}
function tripTieneCarguero(t){ return !!(t.carguero && t.carguero.nombre); }
function tripCargueroPendiente(t){ return tripTieneCarguero(t) && !t.carguero.pagado; }
// Ingreso devengado del viaje: flete + servicios adicionales − descuento (sin restar costos todavía)
function tripIngresoBruto(t){
  return round2((Number(t.valorFlete)||0) + serviciosAdicionalesTotal(t) - (Number(t.descuento)||0));
}
// Utilidad neta = Ingreso − Costos en ruta − Pago carguero − % de factura de la compañía
function tripUtilidadNeta(t){
  return round2(tripIngresoBruto(t) - costosRutaTotal(t) - cargueroMontoTrip(t) - costoFacturaTrip(t));
}

// ---- Cuentas por cobrar: semáforo automático (item 13-16) ----
// 🟢 dentro del plazo · 🟡 vence en 1-2 días · 🔴 +8 días sin pagar · ⚫ +15 días, riesgo real
function diasSinPagar(t){ return daysBetween(t.fecha, todayISO()); }
function semaforoCobro(t){
  const dias = diasSinPagar(t);
  const plazo = DB.meta.diasPlazoCobro || 8;
  if (dias >= 15) return 'negro';       // ≥15 días → riesgo real (inclusivo)
  if (dias > plazo) return 'rojo';      // >plazo sin pagar
  if (dias >= plazo-1) return 'amarillo'; // vence en 1-2 días
  return 'verde';
}
const SEMAFORO_INFO = {
  verde:   {icon:'🟢', label:'Dentro del plazo', color:'var(--green)'},
  amarillo:{icon:'🟡', label:'Vence pronto', color:'var(--yellow)'},
  rojo:    {icon:'🔴', label:'Más de 8 días sin pagar', color:'var(--red)'},
  negro:   {icon:'⚫', label:'Riesgo real (+15 días)', color:'var(--text-dim)'},
};
// Cuentas por cobrar abiertas (todo el historial, no solo el periodo actual)
function cuentasPorCobrarAbiertas(){
  return DB.trips.filter(t=>t.estado==='por_cobrar').sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
// Solo cuenta como "dinero disponible" lo verde/amarillo — lo rojo/negro NO cuenta (item 16)
function totalCuentasPorCobrarDisponible(){
  return round2(cuentasPorCobrarAbiertas().filter(t=>{
    const s = semaforoCobro(t); return s==='verde' || s==='amarillo';
  }).reduce((s,t)=>s+tripSaldoPendiente(t),0));
}
function totalCuentasPorCobrarRiesgo(){
  return round2(cuentasPorCobrarAbiertas().filter(t=>{
    const s = semaforoCobro(t); return s==='rojo' || s==='negro';
  }).reduce((s,t)=>s+tripSaldoPendiente(t),0));
}

// ---- Cargueros: dinero en tránsito, NO se mezcla con tus ingresos (item 9-12) ----
function carguerosPendientes(){
  return DB.trips.filter(t=>tripCargueroPendiente(t)).sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
function totalCarguerosPendientes(){
  return round2(carguerosPendientes().reduce((s,t)=>s+cargueroMontoTrip(t),0));
}
function diasSinPagarCarguero(t){ return daysBetween(t.fecha, todayISO()); }

// Ingresos devengados del periodo (flete + servicios − descuento), sin importar si está cobrado
function periodTripsIngreso(items){
  return items.reduce((s,t)=> s + tripIngresoBruto(t), 0);
}
function periodCostosRuta(items){
  return round2(items.reduce((s,t)=>s+costosRutaTotal(t),0));
}
function periodCargueroPagos(items){
  return round2(items.reduce((s,t)=>s+cargueroMontoTrip(t),0));
}
function periodCostoFactura(items){
  return round2(items.reduce((s,t)=>s+costoFacturaTrip(t),0));
}
function periodUtilidadNetaViajes(items){
  return round2(items.reduce((s,t)=>s+tripUtilidadNeta(t),0));
}
function periodExpensesByGrupo(items, grupo){
  return items.filter(e=>expenseGrupo(e.categoria)===grupo).reduce((s,e)=>s+e.monto,0);
}
// COSTO vs EGRESO (item: terminología nueva) — incluye gastos sueltos clasificados
function periodExpensesByTipo(items, tipo){
  return round2(items.filter(e=>expenseTipo(e.categoria)===tipo).reduce((s,e)=>s+e.monto,0));
}
function periodPlataEnCalle(items){
  return items.filter(t=>t.estado==='por_cobrar').reduce((s,t)=>s+tripSaldoPendiente(t),0);
}

// Saldos de caja acumulados (todo el historial, no filtrado por periodo)
function computeBalances(){
  let efectivo = 0, banco = 0;
  for (const t of DB.trips){
    if ((t.anticipo||0) > 0) efectivo += t.anticipo; // anticipo se asume recibido en efectivo
    if (t.estado==='cobrado'){
      // Lo que realmente entra: flete + servicios − anticipo − descuento − % de la compañía (factura)
      const monto = (t.valorFlete||0) + serviciosAdicionalesTotal(t) - (t.anticipo||0) - (t.descuento||0) - costoFacturaTrip(t);
      if (t.metodoRecibo==='Transferencia') banco += monto;
      else efectivo += monto;
    }
    // Costos en ruta: se asumen pagados en efectivo durante el viaje
    efectivo -= costosRutaTotal(t);
    // Pago al carguero: solo se descuenta cuando ya se marcó como pagado
    if (t.carguero && t.carguero.pagado) efectivo -= cargueroMontoTrip(t);
  }
  for (const e of DB.expenses){
    if (e.metodoPago==='Transferencia' || e.metodoPago==='Tarjeta') banco -= e.monto;
    else efectivo -= e.monto;
  }
  for (const tr of DB.transfers){
    if (tr.direccion==='efectivo_a_banco'){ efectivo -= tr.monto; banco += tr.monto; }
    else { banco -= tr.monto; efectivo += tr.monto; }
  }
  return { efectivo: round2(efectivo), banco: round2(banco) };
}

/* ============================================================
   SEGURIDAD: PANTALLA DE BLOQUEO POR PIN
   ============================================================ */
let pinBrute = { fails: 0, lockedUntil: 0 };
function pinBruteLoad(){
  try {
    const raw = sessionStorage.getItem('_sanvi_pin_bf');
    if (raw) pinBrute = JSON.parse(raw);
  } catch(_){}
}
function pinBruteSave(){
  try { sessionStorage.setItem('_sanvi_pin_bf', JSON.stringify(pinBrute)); } catch(_){}
}
function pinBruteCheck(){
  // Devuelve segundos restantes de bloqueo (0 = libre)
  const now = Date.now();
  if (pinBrute.lockedUntil > now) return Math.ceil((pinBrute.lockedUntil - now)/1000);
  return 0;
}
function pinBruteFailure(){
  pinBrute.fails = (pinBrute.fails||0) + 1;
  if (pinBrute.fails >= 5){
    pinBrute.lockedUntil = Date.now() + 30000; // 30 segundos
    pinBrute.fails = 0;
  }
  pinBruteSave();
}
function pinBruteSuccess(){
  pinBrute = { fails:0, lockedUntil:0 };
  pinBruteSave();
}
let pinFirstEntry = '';
let pinBusy = false; // evita que toques rápidos se pierdan durante la transición create→confirm
let pinBuffer = '';
let pinMode = 'unlock'; // 'unlock' | 'change-current' | 'create' | 'confirm' | 'remove'
let pinUnlocked = false;
pinBruteLoad();

function checkLock(){
  if (DB.meta.pin && !pinUnlocked){
    pinMode = 'unlock'; pinBuffer = '';
    document.getElementById('lockScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    renderPinPad();
  } else {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    render();
    warnIfDbCorrupted();
  }
}

function pinPromptText(){
  if (pinMode === 'unlock') return 'Ingresa tu PIN';
  if (pinMode === 'change-current') return 'PIN actual para cambiarlo';
  if (pinMode === 'create') return DB.meta.pin ? 'Nuevo PIN' : 'Crea un PIN';
  if (pinMode === 'confirm') return 'Confirma el nuevo PIN';
  if (pinMode === 'remove') return 'PIN actual para quitarlo';
  return 'Ingresa tu PIN';
}

function renderPinPad(){
  const pad = document.getElementById('pinPad');
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  pad.innerHTML = keys.map(k=>{
    if (k==='') return '<span></span>';
    if (k==='⌫') return `<button data-action="pin-back">⌫</button>`;
    return `<button data-action="pin-digit" data-digit="${k}">${k}</button>`;
  }).join('');
  const hint = document.getElementById('pinHint');
  if (hint) hint.textContent = pinPromptText();
  renderPinDots();
  document.getElementById('pinError').textContent = '';
}
function renderPinDots(){
  const dots = document.getElementById('pinDots');
  let html = '';
  for (let i=0;i<4;i++) html += `<span class="${i<pinBuffer.length?'filled':''}"></span>`;
  dots.innerHTML = html;
}
function pinDigit(d){
  if (pinBusy) return;
  const wait = pinBruteCheck();
  if (wait > 0){
    document.getElementById('pinError').textContent = `Demasiados intentos. Espera ${wait}s`;
    return;
  }
  if (pinBuffer.length>=4) return;
  pinBuffer += d;
  renderPinDots();
  if (pinBuffer.length===4){
    pinBusy = true;
    setTimeout(()=>{ processPinEntry(); pinBusy=false; }, 150);
  }
}
function pinBack(){ if (pinBusy) return; pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); }

function processPinEntry(){
  if (pinMode==='unlock'){
    if (pinBuffer === DB.meta.pin){
      pinUnlocked = true;
      pinBruteSuccess();
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      render();
      warnIfDbCorrupted();
    } else {
      pinBruteFailure();
      const wait = pinBruteCheck();
      const remaining = 5 - (pinBrute.fails||0);
      if (wait > 0){
        document.getElementById('pinError').textContent = `Demasiados intentos. Bloqueado ${wait}s`;
      } else {
        document.getElementById('pinError').textContent = `PIN incorrecto (${remaining} intento${remaining!==1?'s':''} antes del bloqueo)`;
      }
      pinBuffer=''; renderPinDots();
    }
  } else if (pinMode==='change-current'){
    if (pinBuffer === DB.meta.pin){
      pinBruteSuccess();
      pinBuffer=''; pinFirstEntry=''; pinMode='create';
      document.getElementById('pinError').textContent='';
      renderPinPad();
    } else {
      pinBruteFailure();
      const wait = pinBruteCheck();
      document.getElementById('pinError').textContent = wait > 0 ? `Demasiados intentos. Bloqueado ${wait}s` : 'PIN actual incorrecto';
      pinBuffer=''; renderPinDots();
    }
  } else if (pinMode==='create'){
    pinFirstEntry = pinBuffer;
    pinBuffer=''; pinMode='confirm';
    document.getElementById('pinError').textContent='';
    renderPinDots();
  } else if (pinMode==='confirm'){
    if (pinBuffer === pinFirstEntry){
      DB.meta.pin = pinBuffer;
      pinUnlocked = true;
      touchSettings();
      saveDB();
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      showToast('PIN configurado');
      render();
    } else {
      document.getElementById('pinError').textContent = 'No coincide, vuelve a crear el PIN';
      pinBuffer=''; pinMode='create'; renderPinDots();
    }
  } else if (pinMode==='remove'){
    if (pinBuffer === DB.meta.pin){
      DB.meta.pin = null;
      pinUnlocked = true;
      touchSettings();
      saveDB();
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      showToast('PIN desactivado');
      render();
    } else {
      document.getElementById('pinError').textContent = 'PIN incorrecto';
      pinBuffer=''; renderPinDots();
    }
  }
}
function openSetPin(){
  pinMode = DB.meta.pin ? 'change-current' : 'create';
  pinBuffer=''; pinFirstEntry='';
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  renderPinPad();
}
function openRemovePin(){
  pinMode='remove'; pinBuffer='';
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  renderPinPad();
}

// Engancha el arrastre (mouse y touch) de un medidor ya pintado en el DOM.
// Devuelve la función setValue por si se necesita fijar el valor desde fuera.
function wireFuelGauge(containerId, initial, onChange){
  const wrap = document.getElementById(containerId);
  if (!wrap) return null;
  const svg = wrap.querySelector('.fg-svg');
  const needle = wrap.querySelector('.fg-needle');
  const label = wrap.querySelector('.fg-label');
  const cx=100, cy=100, r=78;
  function setValue(v){
    v = Math.max(0, Math.min(100, Math.round(v)));
    label.textContent = v+'%';
    const theta = (180 - v*1.8) * Math.PI/180;
    needle.setAttribute('x2', (cx + r*Math.cos(theta)).toFixed(1));
    needle.setAttribute('y2', (cy - r*Math.sin(theta)).toFixed(1));
    wrap.dataset.value = v;
    if (onChange) onChange(v);
    return v;
  }
  function fromPointer(ev){
    const rect = svg.getBoundingClientRect();
    const t = ev.touches ? ev.touches[0] : ev;
    const px = ((t.clientX - rect.left)/rect.width)*200;
    const py = ((t.clientY - rect.top)/rect.height)*110;
    const dx = px-cx, dy = cy-py;
    let theta;
    if (dy < 0) theta = dx>=0 ? 0 : 180;
    else theta = Math.max(0, Math.min(180, Math.atan2(dy,dx)*180/Math.PI));
    setValue((180-theta)/1.8);
  }
  function move(ev){ fromPointer(ev); ev.preventDefault(); }
  function end(){
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', end);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', end);
  }
  function start(ev){
    fromPointer(ev); ev.preventDefault();
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', end);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('touchend', end);
  }
  svg.addEventListener('mousedown', start);
  svg.addEventListener('touchstart', start, {passive:false});
  setValue(initial==null?50:initial);
  return setValue;
}

function openTripForm(id){
  const t = id ? DB.trips.find(x=>x.id===id) : null;
  openModal(t? 'Editar viaje' : 'Nuevo viaje', tripFormHtml(t),
    `<button class="btn btn-secondary" data-action="close-modal">Cancelar</button>
     <button class="btn btn-primary" data-action="save-trip">${t?'Guardar':'Registrar viaje'}</button>`);
  wireTripFormInteractivity(t);
}
function wireSeg(id, onChange){
  const seg = document.getElementById(id);
  if (!seg) return;
  seg.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if (onChange) onChange(b);
  }));
}
function wireTripFormInteractivity(t){
  wireSeg('tEstadoSeg', (b)=>{
    document.getElementById('tMetodoWrap').classList.toggle('hidden', b.dataset.val!=='cobrado');
  });
  wireSeg('tMetodoSeg');
  wireSeg('tFacturaSeg', (b)=>{
    document.getElementById('tFacturaPctWrap').classList.toggle('hidden', b.dataset.val!=='si');
    updateTripUtilidadPreview();
  });
  wireSeg('tCargueroSeg', (b)=>{
    document.getElementById('tCargueroWrap').classList.toggle('hidden', b.dataset.val!=='si');
    updateTripUtilidadPreview();
  });
  wireSeg('tCargueroPagadoSeg');
  wireServiciosList();
  wireFuelGauge('tFgSalida', t && t.combustible ? t.combustible.salida : 50);
  wireFuelGauge('tFgRegreso', t && t.combustible ? t.combustible.regreso : 30);
  ['tValor','tAnticipo','tDescuento'].forEach(id=>{
    document.getElementById(id).addEventListener('input', ()=>{ updateTripSaldoPreview(); updateTripUtilidadPreview(); });
  });
  ['tCostoDiesel','tCostoPeaje','tCostoComida','tCostoOtro','tCargueroMonto','tFacturaPct'].forEach(id=>{
    document.getElementById(id).addEventListener('input', updateTripUtilidadPreview);
  });
  updateTripUtilidadPreview();
}
function updateTripSaldoPreview(){
  const v = Number(document.getElementById('tValor').value)||0;
  const a = Number(document.getElementById('tAnticipo').value)||0;
  const d = Number(document.getElementById('tDescuento').value)||0;
  const serviciosTotal = tripFormServicios.reduce((s,x)=>s+(Number(x.valor)||0),0);
  document.getElementById('tSaldoPreview').textContent = fmtMoney(round2(Math.max(0, v+serviciosTotal-a-d)));
}
function updateTripUtilidadPreview(){
  const v = Number(document.getElementById('tValor').value)||0;
  const d = Number(document.getElementById('tDescuento').value)||0;
  const serviciosTotal = tripFormServicios.reduce((s,x)=>s+(Number(x.valor)||0),0);
  const costosRuta = (Number(document.getElementById('tCostoDiesel').value)||0)
    + (Number(document.getElementById('tCostoPeaje').value)||0)
    + (Number(document.getElementById('tCostoComida').value)||0)
    + (Number(document.getElementById('tCostoOtro').value)||0);
  const cargueroActivo = (document.querySelector('#tCargueroSeg button.active')||{}).dataset?.val==='si';
  const cargueroMonto = cargueroActivo ? (Number(document.getElementById('tCargueroMonto').value)||0) : 0;
  const facturaActiva = (document.querySelector('#tFacturaSeg button.active')||{}).dataset?.val==='si';
  const facturaPct = facturaActiva ? (Number(document.getElementById('tFacturaPct').value)||0) : 0;
  const costoFactura = v * (facturaPct/100);
  const utilidad = round2(v + serviciosTotal - d - costosRuta - cargueroMonto - costoFactura);
  const el = document.getElementById('tUtilidadPreview');
  if (el){ el.textContent = fmtMoney(utilidad); el.style.color = utilidad>=0 ? 'var(--green)' : 'var(--red)'; }
}
function saveTripFromForm(){
  const id = document.getElementById('tripId').value;
  const existing = id ? DB.trips.find(x=>x.id===id) : null;
  const fecha = document.getElementById('tFecha').value || todayISO();
  const valorFlete = Number(document.getElementById('tValor').value)||0;
  if (valorFlete<=0){ showToast('Ingresa el valor del flete'); return; }
  const estado = document.querySelector('#tEstadoSeg button.active').dataset.val;
  const metodoRecibo = estado==='cobrado' ? document.querySelector('#tMetodoSeg button.active').dataset.val : null;
  const nombre = document.getElementById('tProductor').value.trim();
  const meta = dateMeta(fecha);
  const kmIniVal = document.getElementById('tKmIni').value;
  const kmFinVal = document.getElementById('tKmFin').value;

  let productorId = null;
  if (nombre){
    let prod = DB.producers.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase());
    if (!prod){
      const stamp = nowISO();
      prod = {id:uuid(), nombre, telefono: document.getElementById('tTelefono').value.trim(), notas:'', createdAt:stamp, updatedAt:stamp};
      DB.producers.push(prod);
    } else if (document.getElementById('tTelefono').value.trim()){
      prod.telefono = document.getElementById('tTelefono').value.trim();
      prod.updatedAt = nowISO();
    }
    productorId = prod.id;
  }

  const requiereFactura = document.querySelector('#tFacturaSeg button.active').dataset.val==='si';
  const cargueroActiva = document.querySelector('#tCargueroSeg button.active').dataset.val==='si';
  let carguero = null;
  if (cargueroActiva){
    const nombreCarguero = document.getElementById('tCargueroNombre').value.trim();
    if (nombreCarguero){
      const pagado = document.querySelector('#tCargueroPagadoSeg button.active').dataset.val==='si';
      const prevCarguero = existing ? existing.carguero : null;
      const fechaPago = pagado ? ((prevCarguero && prevCarguero.pagado) ? prevCarguero.fechaPago : todayISO()) : null;
      carguero = { nombre: nombreCarguero, monto: Number(document.getElementById('tCargueroMonto').value)||0, pagado, fechaPago };
    }
  }
  const serviciosAdicionales = tripFormServicios
    .filter(s=>s.nombre.trim() || Number(s.valor)>0)
    .map(s=>({nombre:s.nombre.trim(), valor:Number(s.valor)||0}));
  const fgSalida = document.getElementById('tFgSalida');
  const fgRegreso = document.getElementById('tFgRegreso');

  const data = {
    fecha, anio: meta.anio, mes: meta.mes, semana: meta.semana,
    tipoCarga: document.getElementById('tTipo').value,
    origenViaje: document.getElementById('tOrigen').value,
    productorId, productorNombre: nombre, productorTelefono: document.getElementById('tTelefono').value.trim(),
    ruta: document.getElementById('tRuta').value.trim(),
    valorFlete,
    anticipo: Number(document.getElementById('tAnticipo').value)||0,
    descuento: Number(document.getElementById('tDescuento').value)||0,
    serviciosAdicionales,
    requiereFactura,
    facturaPct: requiereFactura ? (Number(document.getElementById('tFacturaPct').value)||0) : 0,
    estado, metodoRecibo,
    carguero,
    costosRuta: {
      diesel: Number(document.getElementById('tCostoDiesel').value)||0,
      peaje: Number(document.getElementById('tCostoPeaje').value)||0,
      comida: Number(document.getElementById('tCostoComida').value)||0,
      otro: Number(document.getElementById('tCostoOtro').value)||0,
    },
    combustible: {
      salida: fgSalida ? Number(fgSalida.dataset.value) : null,
      regreso: fgRegreso ? Number(fgRegreso.dataset.value) : null,
    },
    kmInicial: kmIniVal===''? null : Number(kmIniVal),
    kmFinal: kmFinVal===''? null : Number(kmFinVal),
    nota: document.getElementById('tNota').value.trim(),
  };

  if (id){
    const t = existing;
    data.fechaCobro = estado==='cobrado'
      ? ((t.estado==='cobrado' && t.fechaCobro) ? t.fechaCobro : todayISO())
      : null;
    Object.assign(t, data); t.updatedAt = nowISO();
  } else {
    data.id = uuid(); data.createdAt = nowISO(); data.updatedAt = nowISO();
    data.fechaCobro = estado==='cobrado' ? fecha : null;
    DB.trips.push(data);
  }
  saveDB(); closeModal(); showToast(id?'Viaje actualizado':'Viaje registrado'); render();
}
function confirmDeleteTrip(id){
  openModal('¿Eliminar viaje?', `<p style="color:var(--text-dim);font-size:13.5px;">Esta acción no se puede deshacer.</p>`,
    `<button class="btn btn-secondary" data-action="close-modal">Cancelar</button>
     <button class="btn btn-danger" data-action="do-delete-trip" data-id="${id}">Eliminar</button>`);
}
function deleteTrip(id){
  markPendingDelete('trips', id);
  DB.trips = DB.trips.filter(t=>t.id!==id); saveDB(); closeModal(); showToast('Viaje eliminado'); render();
}
// Marca/desmarca el pago al carguero de un viaje directamente (usado desde el módulo Cargueros)
function toggleCargueroPagado(tripId){
  const t = DB.trips.find(x=>x.id===tripId);
  if (!t || !t.carguero) return;
  t.carguero.pagado = !t.carguero.pagado;
  t.carguero.fechaPago = t.carguero.pagado ? todayISO() : null;
  t.updatedAt = nowISO();
  saveDB(); showToast(t.carguero.pagado?'Marcado como pagado':'Marcado como pendiente'); render();
}

function renderViajes(){
  const trips = DB.trips.filter(t=>inPeriod(t)).sort((a,b)=> b.fecha.localeCompare(a.fecha));
  const ingresoTotal = periodTripsIngreso(trips);
  let listHtml = '';
  if (trips.length===0){
    listHtml = `<div class="empty"><b>Sin viajes este periodo</b>Toca el botón + para registrar el primero.</div>`;
  } else {
    listHtml = `<div class="list">` + trips.map(t=>{
      const saldo = tripSaldoPendiente(t);
      const isPorCobrar = t.estado==='por_cobrar';
      const util = tripUtilidadNeta(t);
      const badges = [];
      if (tripTieneCarguero(t)) badges.push(`<span class="mini-badge ${t.carguero.pagado?'pagado':'pendiente'}">🚚 ${t.carguero.pagado?'Carguero pagado':'Carguero pendiente'}</span>`);
      if (t.requiereFactura) badges.push(`<span class="mini-badge info">🧾 Factura ${t.facturaPct||0}%</span>`);
      return `
      <div class="ticket" data-action="edit-trip" data-id="${t.id}">
        <div class="ticket-main">
          <div class="t-date">${fmtDateShort(t.fecha)} · ${esc(t.tipoCarga)}</div>
          <div class="t-title">${esc(t.productorNombre || 'Sin productor')}</div>
          <div class="t-meta">${esc(t.ruta || '—')}</div>
          ${t.anticipo>0?`<div class="t-meta">Anticipo: ${fmtMoney(t.anticipo)}</div>`:''}
          ${badges.length?`<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">${badges.join('')}</div>`:''}
        </div>
        <div class="ticket-side">
          <span class="stamp ${isPorCobrar?'por-cobrar':'cobrado'}">${isPorCobrar?'Por cobrar':'Cobrado'}</span>
          <div>
            <div class="t-amount ${isPorCobrar?'neg':'pos'}">${fmtMoney(t.valorFlete)}</div>
            ${isPorCobrar?`<div class="t-balance">Saldo ${fmtMoney(saldo)}</div>`:''}
            <div class="t-balance">Util. neta ${fmtMoney(util)}</div>
          </div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  }
  return `
    <div class="view-title">Viajes del periodo<span class="mono">${fmtMoney(ingresoTotal)}</span></div>
    ${listHtml}
    <button class="fab" data-action="new-trip" aria-label="Nuevo viaje">+</button>
  `;
}

function isCommitmentPaymentExpense(e){
  return !!(e && e.detalle && e.detalle.commitmentPayment && e.detalle.commitmentPayment.commitmentId);
}
function restoreCommitmentFromPaymentExpense(e){
  if (!isCommitmentPaymentExpense(e)) return null;
  const info = e.detalle.commitmentPayment;
  const c = DB.commitments.find(x=>x.id===info.commitmentId);
  if (!c) return null;
  if (info.prevSaldoPendiente !== undefined) c.saldoPendiente = info.prevSaldoPendiente;
  if (info.prevEstado !== undefined) c.estado = info.prevEstado;
  if (info.prevFechaProximoPago !== undefined) c.fechaProximoPago = info.prevFechaProximoPago;
  if (info.moraId && Array.isArray(c.historialMora)){
    c.historialMora = c.historialMora.filter(m=>m.id !== info.moraId);
  }
  c.updatedAt = nowISO();
  return { commitment:c, causa:info.causa || 'Otro' };
}
function applyCommitmentPayment(c, monto, fecha, causa){
  const info = {
    commitmentId: c.id,
    amountApplied: monto,
    prevSaldoPendiente: c.saldoPendiente,
    prevEstado: c.estado,
    prevFechaProximoPago: c.fechaProximoPago,
    causa: causa || 'Otro'
  };
  if (c.monto > 0 && monto > c.monto){
    if (!Array.isArray(c.historialMora)) c.historialMora = [];
    info.moraId = uuid();
    c.historialMora.push({ id:info.moraId, fecha, excedente: round2(monto - c.monto), causa: info.causa });
  }
  if (c.tipo==='deuda'){
    c.saldoPendiente = round2((c.saldoPendiente||0) - monto);
    if (c.saldoPendiente<=0){ c.saldoPendiente=0; c.estado='pagada'; }
    else c.fechaProximoPago = addInterval(c.fechaProximoPago, c.frecuencia);
  } else {
    c.fechaProximoPago = addInterval(c.fechaProximoPago, c.frecuencia);
  }
  c.updatedAt = nowISO();
  return info;
}
function saveExpenseFromForm(){
  const id = document.getElementById('expId').value;
  const fecha = document.getElementById('eFecha').value || todayISO();
  const monto = Number(document.getElementById('eMonto').value)||0;
  if (monto<=0){ showToast('Ingresa el monto'); return; }
  const categoria = document.getElementById('eCategoria').value;
  const meta = dateMeta(fecha);
  const detalle = readExpenseDetalle(categoria);
  const galonesEl = document.getElementById('eGalones');
  const data = {
    fecha, anio: meta.anio, mes: meta.mes, semana: meta.semana,
    categoria, monto,
    metodoPago: document.getElementById('eMetodo').value,
    galones: galonesEl && galonesEl.value ? Number(galonesEl.value) : null,
    detalle,
    nota: document.getElementById('eNota').value.trim(),
  };
  if (id){
    const e = DB.expenses.find(x=>x.id===id);
    if (!e) return;
    if (isCommitmentPaymentExpense(e)){
      const payInfo = restoreCommitmentFromPaymentExpense(e);
      if (payInfo && payInfo.commitment){
        data.detalle = Object.assign({}, data.detalle, {
          commitmentPayment: applyCommitmentPayment(payInfo.commitment, monto, fecha, payInfo.causa)
        });
        data.nota = data.nota || e.nota || ('Cuota: ' + payInfo.commitment.nombre);
      }
    }
    Object.assign(e, data); e.updatedAt = nowISO();
  } else {
    data.id = uuid(); data.createdAt = nowISO(); data.updatedAt = nowISO();
    DB.expenses.push(data);
  }
  saveDB(); closeModal(); showToast(id?'Gasto actualizado':'Gasto registrado'); render();
}

function producerStats(p){
  const trips = DB.trips.filter(t=>t.productorId===p.id);
  const totalFacturado = trips.reduce((s,t)=>s + tripIngresoBruto(t), 0);
  const cobrados = trips.filter(t=>t.fechaCobro);
  const diasProm = cobrados.length ? round2(cobrados.reduce((s,t)=>s+daysBetween(t.fecha,t.fechaCobro),0)/cobrados.length) : null;
  const pendientes = trips.filter(t=>t.estado==='por_cobrar');
  const saldoPendiente = pendientes.reduce((s,t)=>s+tripSaldoPendiente(t),0);
  const enMora = pendientes.some(t=>daysBetween(t.fecha, todayISO()) > DB.meta.diasMoraAlerta);
  const diasMoraMax = pendientes.length ? Math.max(...pendientes.map(t=>daysBetween(t.fecha, todayISO()))) : 0;
  // Historial de moroso (item 15): cuántas veces tardó más del plazo, y si hoy está en zona de riesgo
  const plazo = DB.meta.diasPlazoCobro || 8;
  const vecesTardo = cobrados.filter(t=>daysBetween(t.fecha,t.fechaCobro) > plazo).length;
  const enRiesgo = pendientes.some(t=>{ const sm=semaforoCobro(t); return sm==='rojo'||sm==='negro'; });
  return {trips, totalFacturado, diasProm, saldoPendiente, enMora, diasMoraMax, viajesCount:trips.length,
           vecesTardo, cobradosCount:cobrados.length, enRiesgo};
}

function addInterval(iso, frecuencia){
  const d = parseISO(iso);
  if (frecuencia==='semanal') d.setDate(d.getDate()+7);
  else d.setMonth(d.getMonth()+1);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function periodRange(){
  if (STATE.periodMode==='semana'){
    const start = isoWeekStartDate(STATE.periodAnio, STATE.periodSemana);
    const end = new Date(start); end.setDate(end.getDate()+6);
    return {start,end};
  } else {
    const start = new Date(STATE.periodAnio, STATE.periodMes-1, 1);
    const end = new Date(STATE.periodAnio, STATE.periodMes, 0);
    return {start,end};
  }
}
function isoToDate(iso){ return parseISO(iso); }

// Dashboard de mora (item 19): cuánto se ha perdido en total por pagar tarde
function totalMoraPerdidaAllTime(){
  let total=0;
  DB.commitments.forEach(c=> (c.historialMora||[]).forEach(h=> total+=h.excedente));
  return round2(total);
}
function totalMoraPerdidaPeriodo(anio, mes){
  let total = 0;
  DB.commitments.forEach(c=>{
    (c.historialMora||[]).forEach(h=>{
      const d = parseISO(h.fecha);
      if (d.getFullYear()===anio && d.getMonth()+1===mes) total += h.excedente;
    });
  });
  return round2(total);
}

/* ============================================================
   MANTENIMIENTO PREVENTIVO POR KILOMETRAJE
   ============================================================ */
function kmActual(){
  const vals = DB.trips.filter(t=>t.kmFinal!=null).map(t=>t.kmFinal);
  return vals.length ? Math.max(...vals) : 0;
}
function maintenanceStatus(m){
  const actual = kmActual();
  const proximoKm = (m.ultimoKm||0) + m.intervaloKm;
  const restante = proximoKm - actual;
  let estado = 'ok';
  if (restante<=0) estado='vencido';
  else if (restante <= m.intervaloKm*0.1) estado='proximo';
  return {actual, proximoKm, restante, estado};
}
function maintFormHtml(m){
  m = m || {nombre:'', intervaloKm:5000, ultimoKm: kmActual(), notas:''};

/* ============================================================
   RESUMEN GENERAL (DASHBOARD)
   ============================================================ */
function computeAvgMonthlyIncome(){
  const now = new Date();
  let total = 0;
  for (let i=0;i<3;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const anio = d.getFullYear(), mes = d.getMonth()+1;
    const trips = DB.trips.filter(t=>t.anio===anio && t.mes===mes);
    total += periodTripsIngreso(trips);
  }
  return round2(total/3);
}
function computeRendimientoActual(trips, expenses){
  const km = trips.filter(t=>t.kmInicial!=null && t.kmFinal!=null).reduce((s,t)=>s+(t.kmFinal-t.kmInicial),0);
  const gal = expenses.filter(e=>e.categoria==='Combustible' && e.galones).reduce((s,e)=>s+e.galones,0);
  return gal>0 ? round2(km/gal) : null;
}
function computeRendimientoHistorico(periodosAtras){
  const periods = lastNPeriods(periodosAtras+1).slice(0,-1); // excluye el actual
  let km=0, gal=0;
  periods.forEach(p=>{
    const trips = DB.trips.filter(t=>inPeriodCustom(t,p.anio,p.semana,p.mes) && t.kmInicial!=null && t.kmFinal!=null);
    const exps = DB.expenses.filter(e=>inPeriodCustom(e,p.anio,p.semana,p.mes) && e.categoria==='Combustible' && e.galones);
    km += trips.reduce((s,t)=>s+(t.kmFinal-t.kmInicial),0);
    gal += exps.reduce((s,e)=>s+e.galones,0);
  });
  return gal>0 ? round2(km/gal) : null;
}

// Rentabilidad real de un mes calendario (item 29): utilidad de viajes − egresos fijos − cuotas
// compañía − deudas que vencen ese mes = lo que realmente queda.
function rentabilidadRealMes(anio, mes){
  const trips = DB.trips.filter(t=>t.anio===anio && t.mes===mes);
  const expenses = DB.expenses.filter(e=>e.anio===anio && e.mes===mes);
  const utilidadViajes = periodUtilidadNetaViajes(trips);
  const cuotasCompania = round2(expenses.filter(e=>e.categoria==='Cuota Compañía').reduce((s,e)=>s+e.monto,0));
  const egresosFijos = round2(expenses.filter(e=>expenseTipo(e.categoria)==='egreso' && e.categoria!=='Cuota Compañía' && e.categoria!=='Préstamos y Deudas').reduce((s,e)=>s+e.monto,0));
  const deudasVencenMes = round2(DB.commitments.filter(c=>c.tipo==='deuda' && c.estado==='activo' &&
    (()=>{ const d=parseISO(c.fechaProximoPago); return d.getFullYear()===anio && d.getMonth()+1===mes; })()
  ).reduce((s,c)=>s+(c.monto||0),0));
  const moraPerdida = totalMoraPerdidaPeriodo(anio, mes);
  const real = round2(utilidadViajes - egresosFijos - cuotasCompania - deudasVencenMes);
  return {utilidadViajes, egresosFijos, cuotasCompania, deudasVencenMes, moraPerdida, real};
}
// Total de compromisos (deuda + fijo) que vencen en un mes calendario (proyección, no requiere datos reales)
function compromisosQueVencenMes(anio, mes){
  return round2(DB.commitments.filter(c=>c.estado==='activo' &&
    (()=>{ const d=parseISO(c.fechaProximoPago); return d.getFullYear()===anio && d.getMonth()+1===mes; })()
  ).reduce((s,c)=>s+(c.monto||0),0));
}

function buildAlerts(trips, expenses){
  const alerts = [];
  // Mora de cobros
  const enMora = DB.producers.filter(p=>producerStats(p).enMora);
  if (enMora.length){
    alerts.push({level:'danger', text:`<b>${enMora.length} productor(es)</b> con cobro vencido hace más de ${DB.meta.diasMoraAlerta} días.`});
  }
  // Cuentas por cobrar en zona roja/negra (item 31)
  const enRiesgo = cuentasPorCobrarAbiertas().filter(t=>{ const sm=semaforoCobro(t); return sm==='rojo'||sm==='negro'; });
  if (enRiesgo.length){
    alerts.push({level:'danger', text:`<b>${enRiesgo.length} cuenta(s) por cobrar</b> en zona roja/negra por ${fmtMoney(round2(enRiesgo.reduce((s,t)=>s+tripSaldoPendiente(t),0)))} — no cuentan como dinero disponible.`});
  }
  // Cargueros sin pagar (item 31)
  const diasAlertaCarg = DB.meta.diasAlertaCarguero || 5;
  const cargPend = carguerosPendientes().filter(t=>diasSinPagarCarguero(t) >= diasAlertaCarg);
  if (cargPend.length){
    alerts.push({level:'warn', text:`<b>${cargPend.length} carguero(s)</b> llevan ${diasAlertaCarg}+ días sin que les pagues (${fmtMoney(round2(cargPend.reduce((s,t)=>s+cargueroMontoTrip(t),0)))}).`});
  }
  // Endeudamiento crítico
  const deuda = totalDeudaActiva();
  const avgIngreso = computeAvgMonthlyIncome();
  if (avgIngreso>0 && deuda > avgIngreso*(DB.meta.thresholdEndeudamientoPct/100)){
    alerts.push({level:'danger', text:`Endeudamiento de <b>${fmtMoney(deuda)}</b> supera el ${DB.meta.thresholdEndeudamientoPct}% del ingreso mensual promedio.`});
  }
  // Compromisos vencidos (item 31: deudas por vencer)
  const vencidos = DB.commitments.filter(c=>c.estado==='activo' && isoToDate(c.fechaProximoPago) < new Date(new Date().setHours(0,0,0,0)));
  if (vencidos.length){
    alerts.push({level:'warn', text:`<b>${vencidos.length} compromiso(s)</b> vencido(s) sin pagar.`});
  }
  // Mantenimiento vencido
  const mantVencido = DB.maintenance.filter(m=>maintenanceStatus(m).estado==='vencido');
  if (mantVencido.length){
    alerts.push({level:'warn', text:`Mantenimiento vencido: <b>${mantVencido.map(m=>esc(m.nombre)).join(', ')}</b>.`});
  }
  // Rendimiento de combustible
  const actual = computeRendimientoActual(trips, expenses);
  const historico = computeRendimientoHistorico(4);
  if (actual!=null && historico!=null && actual < historico*0.7){
    alerts.push({level:'warn', text:`Rendimiento cayó a <b>${actual} km/gal</b> (antes ${historico} km/gal). Revisa fugas, robo de diésel o mantenimiento.`});
  }
  return alerts;
}

function renderTrendBars(){

/* ============================================================
   CIERRE MENSUAL — P&G de un mes cerrado (item 32-34)
   ============================================================ */
let cierreState = {anio:null, mes:null};
function initCierreState(){
  if (cierreState.anio==null){
    const d = new Date();
    cierreState.anio = d.getFullYear(); cierreState.mes = d.getMonth()+1;
  }
}
function shiftCierreMes(dir){
  initCierreState();
  let m = cierreState.mes + dir, y = cierreState.anio;
  if (m < 1){ m = 12; y -= 1; } if (m > 12){ m = 1; y += 1; }
  cierreState.mes = m; cierreState.anio = y;
  render();
}
function cierreMesPL(anio, mes){
  const trips = DB.trips.filter(t=>t.anio===anio && t.mes===mes);
  const expenses = DB.expenses.filter(e=>e.anio===anio && e.mes===mes);
  const ingresosBrutos = round2(trips.reduce((s,t)=>s+tripIngresoBruto(t),0));
  const costosViajes = round2(periodCostosRuta(trips) + periodCargueroPagos(trips) + periodCostoFactura(trips));
  const costosSueltos = periodExpensesByTipo(expenses,'costo');
  const costosTotal = round2(costosViajes + costosSueltos);
  const egresosTotal = periodExpensesByTipo(expenses,'egreso');
  const moraPerdida = totalMoraPerdidaPeriodo(anio, mes);
  const utilidadNetaReal = round2(ingresosBrutos - costosTotal - egresosTotal - moraPerdida);
  return {anio, mes, ingresosBrutos, costosViajes, costosSueltos, costosTotal, egresosTotal, moraPerdida, utilidadNetaReal, trips};
}
function rentabilidadPorProductorMes(anio, mes){
  const trips = DB.trips.filter(t=>t.anio===anio && t.mes===mes);
  const map = {};
  trips.forEach(t=>{
    const key = t.productorNombre || 'Sin productor';
    if (!map[key]) map[key] = {nombre:key, utilidad:0, viajes:0};
    map[key].utilidad += tripUtilidadNeta(t);
    map[key].viajes += 1;
  });
  return Object.values(map).map(x=>({...x, utilidad:round2(x.utilidad)})).sort((a,b)=>b.utilidad-a.utilidad);
}
function renderCierreTrendBars(anioFin, mesFin){
  const meses = [];
  let y=anioFin, m=mesFin;
  for (let i=0;i<6;i++){
    meses.unshift({anio:y, mes:m});
    m -= 1; if (m<1){ m=12; y-=1; }
  }
  const values = meses.map(p=>cierreMesPL(p.anio,p.mes).utilidadNetaReal);
  const maxAbs = Math.max(1, ...values.map(v=>Math.abs(v)));
  return `<div class="vbars">` + meses.map((p,i)=>{
    const v = values[i];
    const pct = Math.max(4, Math.round((Math.abs(v)/maxAbs)*100));
    return `
      <div class="vb-col">
        <div class="vb-track">
          <span class="vb-val">${v!==0?fmtMoney(v).replace('.00',''):''}</span>
          <div class="vb-fill ${v>=0?'pos':'neg'}" style="height:${pct}%;"></div>
          <div class="vb-zero"></div>
        </div>
        <div class="vb-label">${MES_NOMBRES[p.mes-1].slice(0,3)}</div>
      </div>`;
  }).join('') + `</div>`;
}
