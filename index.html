function renderReporteGastos(expenses){
  const porCategoria = {};
  expenses.forEach(e=>{ porCategoria[e.categoria] = (porCategoria[e.categoria]||0) + e.monto; });
  const rows = Object.entries(porCategoria).sort((a,b)=>b[1]-a[1]);
  const total = rows.reduce((s,r)=>s+r[1],0);
  return `
    <div class="card">${renderCategoryHBars(rows.slice(0,6))}</div>
    <div class="view-title">Por categoría<span class="mono">${fmtMoney(total)}</span></div>
    ${rows.length===0?'<div class="empty"><b>Sin gastos en el periodo</b></div>':`<div class="list">` + rows.map(([cat,monto])=>`
      <div class="row"><div class="r-main"><div class="r-title">${cat}</div><div class="r-sub">${expenseGrupo(cat)==='camion'?'Camión':'Personal'}</div></div><div class="r-val neg">-${fmtMoney(monto)}</div></div>`).join('') + `</div>`}
  `;
}
function renderCategoryHBars(rows){
  if (rows.length===0) return '<div class="empty"><b>Sin datos</b></div>';
  const max = Math.max(...rows.map(r=>r[1]), 1);
  return `<div class="hbars">` + rows.map(([cat,monto])=>`
    <div class="hb-row">
      <div class="hb-label">${cat}</div>
      <div class="hb-track"><div class="hb-fill" style="width:${Math.max(4,Math.round((monto/max)*100))}%;"></div></div>
      <div class="hb-val">${fmtMoney(monto)}</div>
    </div>`).join('') + `</div>`;
}
function renderReporteDeudas(){
  const activos = DB.commitments.filter(c=>c.tipo==='deuda');
  const total = activos.filter(c=>c.estado==='activo').reduce((s,c)=>s+(c.saldoPendiente||0),0);
  return `
    <div class="hero-card"><div class="hero-label">Saldo total en deudas</div><div class="hero-value neg">${fmtMoney(total)}</div></div>
    ${activos.length===0?'<div class="empty"><b>Sin deudas registradas</b></div>':`<div class="list">` + activos.map(c=>`
      <div class="row"><div class="r-main"><div class="r-title">${esc(c.nombre)}</div><div class="r-sub">${c.estado==='pagada'?'Pagada':'Saldo '+fmtMoney(c.saldoPendiente)+' de '+fmtMoney(c.montoTotal)}</div></div></div>`).join('') + `</div>`}
  `;
}
function renderReporteDiario(expenses){
  const items = expenses.filter(e=>e.categoria==='Comida y Suministros' || e.categoria==='Arriendo').sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const totalComida = items.filter(e=>e.categoria==='Comida y Suministros').reduce((s,e)=>s+e.monto,0);
  const totalArriendo = items.filter(e=>e.categoria==='Arriendo').reduce((s,e)=>s+e.monto,0);
  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="lbl">Comida y Suministros</div><div class="val neg">-${fmtMoney(totalComida)}</div></div>
      <div class="stat-card"><div class="lbl">Arriendo</div><div class="val neg">-${fmtMoney(totalArriendo)}</div></div>
    </div>
    ${items.length===0?'<div class="empty"><b>Sin gastos de comida o arriendo</b></div>':`<div class="list">` + items.map(e=>`
      <div class="row"><div class="r-main"><div class="r-title">${esc(e.categoria)}</div><div class="r-sub">${esc(expenseSubtitle(e))} · ${fmtDateShort(e.fecha)}</div></div><div class="r-val neg">-${fmtMoney(e.monto)}</div></div>`).join('') + `</div>`}
  `;
}

// Módulo Compañía / Facturación (item 25-27): cuánto se pagó vs. cuánto se facturó a través de ella
function renderReporteCompania(){
  const trips = DB.trips.filter(t=>inPeriod(t));
  const expenses = DB.expenses.filter(e=>inPeriod(e));
  const cuotaPagada = round2(expenses.filter(e=>e.categoria==='Cuota Compañía').reduce((s,e)=>s+e.monto,0));
  const facturados = trips.filter(t=>t.requiereFactura);
  const totalFacturado = round2(facturados.reduce((s,t)=>s+tripIngresoBruto(t),0));
  const totalRetenido = round2(facturados.reduce((s,t)=>s+costoFacturaTrip(t),0));
  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="lbl">Cuota pagada a la compañía</div><div class="val neg">-${fmtMoney(cuotaPagada)}</div></div>
      <div class="stat-card"><div class="lbl">Total facturado por ella</div><div class="val">${fmtMoney(totalFacturado)}</div></div>
      <div class="stat-card"><div class="lbl">% retenido en viajes con factura</div><div class="val neg">-${fmtMoney(totalRetenido)}</div></div>
      <div class="stat-card"><div class="lbl">Viajes con factura</div><div class="val">${facturados.length}</div></div>
    </div>
    <div class="view-title">Viajes facturados este periodo</div>
    ${facturados.length===0?'<div class="empty"><b>Sin viajes con factura este periodo</b></div>':`<div class="list">` + facturados.map(t=>`
      <div class="row" data-action="edit-trip" data-id="${t.id}"><div class="r-main"><div class="r-title">${esc(t.productorNombre||'Sin productor')}</div><div class="r-sub">${fmtDateShort(t.fecha)} · ${t.facturaPct||0}% compañía</div></div><div class="r-val neg">-${fmtMoney(costoFacturaTrip(t))}</div></div>`).join('') + `</div>`}
  `;
}

// Combustible (item 35-37): historial de consumo por viaje para detectar si el camión consume más de lo normal
function tripConsumoGalones(t){
  const cb = t.combustible||{};
  if (cb.salida==null || cb.regreso==null) return null;
  const pct = Math.max(0, Number(cb.salida) - Number(cb.regreso));
  return round2((pct/100) * (DB.meta.capacidadTanqueGalones||200));
}
function renderReporteCombustible(){
  const trips = DB.trips.filter(t=>inPeriod(t) && tripConsumoGalones(t)!=null).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const consumos = trips.map(t=>tripConsumoGalones(t));
  const promedio = consumos.length ? round2(consumos.reduce((s,v)=>s+v,0)/consumos.length) : null;
  return `
    <div class="stat-card"><div class="lbl">Consumo promedio por viaje</div><div class="val">${promedio!=null?promedio+' gal':'—'}</div><div class="sub">Calculado del medidor salida/regreso de cada viaje</div></div>
    <div class="view-title">Historial de consumo</div>
    ${trips.length===0?'<div class="empty"><b>Sin datos de combustible este periodo</b>Usa el medidor en cada viaje (salida/regreso).</div>':`<div class="list">` + trips.map(t=>{
      const c = tripConsumoGalones(t);
      const anomalia = promedio!=null && promedio>0 && c > promedio*1.3;
      return `<div class="row" data-action="edit-trip" data-id="${t.id}">
        <div class="r-main">
          <div class="r-title">${fmtDateShort(t.fecha)} · ${esc(t.ruta || t.tipoCarga)} ${anomalia?'<span class="stamp mora" style="font-size:9px;padding:1px 4px;">ALTO</span>':''}</div>
          <div class="r-sub">Salida ${t.combustible.salida}% · Regreso ${t.combustible.regreso}%</div>
        </div>
        <div class="r-val">${c} gal</div>
      </div>`;
    }).join('') + `</div>`}
  `;
}

function csvEscape(v){
  if (v==null) return '';
  const s = String(v).replace(/"/g,'""');
  return /[",\n]/.test(s) ? `"${s}"` : s;
}
function exportCSV(){
  const tripRows = [['id','fecha','semana','mes','anio','tipoCarga','origenViaje','productor','telefono','ruta',
    'valorFlete','anticipo','descuento','serviciosAdicionales','saldoPendiente','estado','metodoRecibo',
    'requiereFactura','facturaPct','costoFactura','cargueroNombre','cargueroMonto','cargueroPagado',
    'costoDiesel','costoPeaje','costoComida','costoOtro','utilidadNeta',
    'combustibleSalida','combustibleRegreso','kmInicial','kmFinal','nota']];
  DB.trips.forEach(t=>tripRows.push([
    t.id,t.fecha,t.semana,t.mes,t.anio,t.tipoCarga,t.origenViaje||'',t.productorNombre,t.productorTelefono,t.ruta,
    t.valorFlete,t.anticipo,t.descuento,serviciosAdicionalesTotal(t),tripSaldoPendiente(t),t.estado,t.metodoRecibo,
    t.requiereFactura?'Sí':'No', t.facturaPct||0, costoFacturaTrip(t),
    t.carguero?t.carguero.nombre:'', t.carguero?t.carguero.monto:'', t.carguero?(t.carguero.pagado?'Pagado':'Pendiente'):'',
    (t.costosRuta||{}).diesel||0,(t.costosRuta||{}).peaje||0,(t.costosRuta||{}).comida||0,(t.costosRuta||{}).otro||0,
    tripUtilidadNeta(t),
    (t.combustible||{}).salida!=null?(t.combustible||{}).salida:'', (t.combustible||{}).regreso!=null?(t.combustible||{}).regreso:'',
    t.kmInicial,t.kmFinal,t.nota
  ]));
  const expRows = [['id','fecha','semana','mes','anio','categoria','grupo','tipo','monto','metodoPago','galones','detalle','nota']];
  DB.expenses.forEach(e=>expRows.push([e.id,e.fecha,e.semana,e.mes,e.anio,e.categoria,expenseGrupo(e.categoria),expenseTipo(e.categoria),e.monto,e.metodoPago,e.galones,JSON.stringify(e.detalle||{}),e.nota]));
  const cmRows = [['id','nombre','tipo','plazo','clasificacion','montoTotal','saldoPendiente','monto','frecuencia','fechaProximoPago','categoriaGasto','estado','perdidaPorMora']];
  DB.commitments.forEach(c=>cmRows.push([c.id,c.nombre,c.tipo,c.plazo||'',c.clasificacion||'',c.montoTotal,c.saldoPendiente,c.monto,c.frecuencia,c.fechaProximoPago,c.categoriaGasto,c.estado,(c.historialMora||[]).reduce((s,h)=>s+h.excedente,0)]));
  const toCsv = rows => rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  downloadBlob(new Blob([toCsv(tripRows)],{type:'text/csv'}), `viajes-${todayISO()}.csv`);
  setTimeout(()=>downloadBlob(new Blob([toCsv(expRows)],{type:'text/csv'}), `gastos-${todayISO()}.csv`), 300);
  setTimeout(()=>downloadBlob(new Blob([toCsv(cmRows)],{type:'text/csv'}), `compromisos-${todayISO()}.csv`), 600);
  showToast('CSV de viajes, gastos y compromisos descargados');
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

/* ============================================================
   RESPALDO EN LA NUBE (GOOGLE SHEETS, MANUAL)
   ------------------------------------------------------------
   Modelo deliberadamente simple: este teléfono SIEMPRE manda la
   Guarda local primero y sincroniza con Google Sheets en segundo plano.
   El servidor decide por updatedAt y conserva eliminaciones para evitar
   que registros borrados reaparezcan en otro dispositivo.
   ============================================================ */
const SYNC_TABLES = ['trips','expenses','producers','transfers','commitments','maintenance'];
let syncBusy = false;
let syncApplying = false;
let autoSyncTimer = null;
let autoSyncInFlight = false;
let autoSyncQueued = false;

function updateSyncPill(){
  const pill = document.getElementById('syncPill');
  const txt = document.getElementById('syncPillText');
  if (!pill || !txt || !DB) return;
  let cls = 'sync-pill';
  let label = 'Sin revisar';
  const pending = SYNC_TABLES.reduce((s,k)=>s+normalizeDeletesForSync((DB.pendingDeletes&&DB.pendingDeletes[k])||[]).length,0);
  if (syncBusy || autoSyncInFlight){
    cls += ' busy'; label = 'Sincronizando...';
  } else if (navigator.onLine === false || autoSyncQueued || pending > 0){
    cls += ' warn'; label = pending > 0 ? 'Pendiente de subir' : 'Sin conexión';
  } else if (DB.meta.lastSyncStatus === 'ok'){
    cls += ' ok'; label = 'Sincronizado';
  } else if (DB.meta.lastSyncStatus === 'error'){
    cls += ' error'; label = 'Error de sync';
  }
  pill.className = cls;
  txt.textContent = label;
}

function syncConfigured(){
  return !!(SYNC_URL && SYNC_TOKEN);
}
function fmtSyncDate(iso){
  if (!iso) return 'Nunca';
  const d = new Date(iso);
  return d.toLocaleString('es-EC', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
}
function syncableMeta(){
  const keys = ['empresaNombre','pin','diasMoraAlerta','diasPlazoCobro','diasAlertaCarguero','capacidadTanqueGalones','thresholdEndeudamientoPct','settingsUpdatedAt'];
  const data = {};
  keys.forEach(k=>{ data[k] = DB.meta[k]; });
  return data;
}
function applySyncedMeta(data){
  if (!data || typeof data !== 'object') return false;
  const oldPin = DB.meta.pin || null;
  ['empresaNombre','pin','diasMoraAlerta','diasPlazoCobro','diasAlertaCarguero','capacidadTanqueGalones','thresholdEndeudamientoPct','settingsUpdatedAt'].forEach(k=>{
    if (data[k] !== undefined && data[k] !== null) DB.meta[k] = data[k];
  });
  return (oldPin || null) !== (DB.meta.pin || null);
}
function asTime(iso){
  const t = Date.parse(iso || '');
  return Number.isFinite(t) ? t : 0;
}
function normalizeDeletesForSync(list){
  return (Array.isArray(list) ? list : []).map(item=>{
    if (item && typeof item === 'object') return { id: String(item.id || ''), deletedAt: item.deletedAt || nowISO() };
    return { id: String(item || ''), deletedAt: nowISO() };
  }).filter(x=>x.id);
}
function buildSyncPayload(action){
  const tables = {};
  SYNC_TABLES.forEach(k=>{ tables[k] = DB[k]; });
  const fallbackTs = '1970-01-01T00:00:00.000Z';
  tables.categories = [{ id:'categories_singleton', updatedAt: DB.meta.categoriesUpdatedAt || fallbackTs, data: DB.categories }];
  tables.settings = [{ id:'settings_singleton', updatedAt: DB.meta.settingsUpdatedAt || fallbackTs, data: syncableMeta() }];
  const deletes = {};
  SYNC_TABLES.forEach(k=>{ deletes[k] = normalizeDeletesForSync(DB.pendingDeletes && DB.pendingDeletes[k]); });
  return { token: SYNC_TOKEN, action, tables, deletes };
}
function mergeRecordTable(tableName, incoming, cloudDeletes){
  let changed = false;
  const current = Array.isArray(DB[tableName]) ? DB[tableName] : [];
  const byId = new Map(current.map(rec=>[String(rec.id), rec]));

  (cloudDeletes || []).forEach(del=>{
    if (!del || !del.id) return;
    const local = byId.get(String(del.id));
    if (local && asTime(del.deletedAt) >= asTime(local.updatedAt || local.createdAt)){
      byId.delete(String(del.id));
      changed = true;
    }
  });

  (Array.isArray(incoming) ? incoming : []).forEach(rec=>{
    if (!rec || !rec.id) return;
    const local = byId.get(String(rec.id));
    if (!local || asTime(rec.updatedAt || rec.createdAt) > asTime(local.updatedAt || local.createdAt)){
      byId.set(String(rec.id), rec);
      changed = true;
    }
  });

  if (changed) DB[tableName] = Array.from(byId.values());
  return changed;
}
function applyCloudState(json){
  if (!json || !json.tables) return { changed:false, pinChanged:false };
  let changed = false;
  let pinChanged = false;
  SYNC_TABLES.forEach(k=>{
    changed = mergeRecordTable(k, json.tables[k], json.deletes && json.deletes[k]) || changed;
  });
  if (Array.isArray(json.tables.categories) && json.tables.categories[0] && json.tables.categories[0].data){
    DB.categories = json.tables.categories[0].data;
    changed = true;
  }
  if (Array.isArray(json.tables.settings) && json.tables.settings[0] && json.tables.settings[0].data){
    pinChanged = applySyncedMeta(json.tables.settings[0].data) || pinChanged;
    changed = true;
  }
  return { changed, pinChanged };
}
function markSyncResult(status, message){
  DB.meta.lastSyncAt = nowISO();
  DB.meta.lastSyncStatus = status;
  DB.meta.lastSyncMessage = message || '';
}
function scheduleAutoSync(delay){
  if (!AUTO_SYNC_ENABLED || !syncConfigured() || syncApplying) return;
  clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(()=>autoSyncNow('auto'), delay == null ? AUTO_SYNC_DEBOUNCE_MS : delay);
}
async function autoSyncNow(reason){
  if (!AUTO_SYNC_ENABLED || !syncConfigured() || syncApplying) return;
  if (autoSyncInFlight){ autoSyncQueued = true; return; }
  if (navigator.onLine === false){ autoSyncQueued = true; updateSyncPill(); return; }
  autoSyncInFlight = true;
  updateSyncPill();
  try{
    const res = await fetch(SYNC_URL, { method:'POST', body: JSON.stringify(buildSyncPayload('sync')) });
    const json = await res.json();
    if (!json || json.ok!==true) throw new Error((json && json.error) || 'Respuesta inesperada del servidor');
    syncApplying = true;
    const cloudState = applyCloudState(json);
    SYNC_TABLES.forEach(k=>{ DB.pendingDeletes[k] = []; });
    markSyncResult('ok', reason==='startup' ? 'Sincronización automática al abrir' : 'Sincronización automática');
    saveDB();
    syncApplying = false;
    updateSyncPill();
    if (cloudState.pinChanged){
      pinUnlocked = false;
      checkLock();
    } else if (cloudState.changed || STATE.view==='sync') render();
  } catch(e){
    syncApplying = true;
    markSyncResult('error', (e && e.message) || 'Error de conexión');
    saveDB();
    syncApplying = false;
    autoSyncQueued = true;
    updateSyncPill();
  } finally {
    autoSyncInFlight = false;
    updateSyncPill();
    if (autoSyncQueued && navigator.onLine !== false){
      autoSyncQueued = false;
      scheduleAutoSync(2500);
    }
  }
}
function startAutoSync(){
  if (!AUTO_SYNC_ENABLED) return;
  window.addEventListener('online', ()=>scheduleAutoSync(500));
  document.addEventListener('visibilitychange', ()=>{
    if (!document.hidden) scheduleAutoSync(500);
  });
  setTimeout(()=>autoSyncNow('startup'), 800);
}

async function pushSync(){
  try{
    const res = await fetch(SYNC_URL, { method:'POST', body: JSON.stringify(buildSyncPayload('sync')) });
    const json = await res.json();
    if (!json || json.ok!==true) throw new Error((json && json.error) || 'Respuesta inesperada del servidor');
    const cloudState = applyCloudState(json);
    // El servidor ya aplicó los borrados: limpiamos la lista local de pendientes.
    // Si esto fallara antes de llegar aquí, los pendientes quedan intactos para reintentar.
    SYNC_TABLES.forEach(k=>{ DB.pendingDeletes[k] = []; });
    markSyncResult('ok', 'Sincronizado: ' + Object.entries(json.counts||{}).map(([k,v])=>`${k} ${v}`).join(', '));
    if (cloudState.pinChanged){
      pinUnlocked = false;
      checkLock();
    }
    showToast('Sincronización completada');
  } catch(e){
    markSyncResult('error', (e && e.message) || 'Error de conexión');
    showToast('No se pudo sincronizar: '+DB.meta.lastSyncMessage);
  }
  syncApplying = true;
  saveDB();
  syncApplying = false;
}
async function pullSync(){
  let pinChanged = false;
  try{
    const res = await fetch(SYNC_URL, { method:'POST', body: JSON.stringify({ token: SYNC_TOKEN, action:'pull' }) });
    const json = await res.json();
    if (!json || json.ok!==true) throw new Error((json && json.error) || 'Respuesta inesperada del servidor');
    SYNC_TABLES.forEach(k=>{
      if (Array.isArray(json.tables && json.tables[k])){
        let incoming = json.tables[k];
        // Protección: si hay borrados locales que aún no se han enviado, no dejamos que
        // un pull los "resucite" por accidente.
        const pending = normalizeDeletesForSync((DB.pendingDeletes && DB.pendingDeletes[k]) || []).map(x=>x.id);
        if (pending.length) incoming = incoming.filter(rec=>!pending.includes(rec.id));
        DB[k] = incoming;
      }
    });
    if (json.tables && Array.isArray(json.tables.categories) && json.tables.categories[0] && json.tables.categories[0].data){
      DB.categories = json.tables.categories[0].data;
    }
    if (json.tables && Array.isArray(json.tables.settings) && json.tables.settings[0] && json.tables.settings[0].data){
      pinChanged = applySyncedMeta(json.tables.settings[0].data) || pinChanged;
    }
    markSyncResult('ok', 'Restaurado desde la nube');
    if (pinChanged){
      pinUnlocked = false;
      checkLock();
    }
    showToast('Datos restaurados desde la nube');
  } catch(e){
    markSyncResult('error', (e && e.message) || 'Error de conexión');
    showToast('No se pudo restaurar: '+DB.meta.lastSyncMessage);
  }
  syncApplying = true;
  saveDB();
  syncApplying = false;
}
async function doSyncPush(){
  if (!syncConfigured()){ showToast('La sincronización no está configurada en el código'); return; }
  syncBusy = true; render();
  await pushSync();
  syncBusy = false; render();
}
async function doSyncPull(){
  syncBusy = true; render();
  await pullSync();
  syncBusy = false; render();
}
function confirmSyncPull(){
  if (!syncConfigured()){ showToast('La sincronización no está configurada en el código'); return; }
  openModal('¿Restaurar desde la nube?', `
    <p style="font-size:13.5px;color:var(--text-dim);line-height:1.5;">
      Esto va a <b>borrar y reemplazar</b> los viajes, gastos, productores, traspasos, deudas y
      mantenimiento guardados en este teléfono con lo que haya en la nube.
    </p>
    <p style="font-size:13.5px;color:var(--text-dim);line-height:1.5;margin-top:8px;">
      Úsalo solo cuando configures un teléfono nuevo. Tu PIN no se toca; los ajustes operativos sí se restauran.
    </p>
  `, `<button class="btn btn-secondary" data-action="close-modal">Cancelar</button>
      <button class="btn btn-danger" data-action="do-sync-pull">Sí, reemplazar todo</button>`);
}

function renderSync(){
  const configured = syncConfigured();
  const statusLine = DB.meta.lastSyncStatus==='ok' ? '✅ Última vez correcto'
    : DB.meta.lastSyncStatus==='error' ? '⚠️ El último intento falló'
    : 'Todavía no se ha sincronizado';
  const pendDel = SYNC_TABLES.reduce((s,k)=>s+((DB.pendingDeletes&&DB.pendingDeletes[k])||[]).length,0);
  return `
    <div class="subview-head"><button class="back-btn" data-action="go-back" data-back="mas">‹</button><h3>Sincronización</h3></div>

    <div class="card">
      <p style="font-size:13px;color:var(--text-dim);line-height:1.5;margin:0 0 12px;">
        La app guarda en este teléfono y sincroniza automáticamente con Google Sheets cuando abres,
        editas o vuelve la conexión.
      </p>
      <div class="alert ok"><span class="a-icon">●</span><span>La conexión con Google Sheets ya está configurada dentro del código.</span></div>
    </div>

    <div class="card">
      <div class="section-label">Estado</div>
      <div class="row" style="margin-bottom:12px;">
        <div class="r-main">
          <div class="r-title">${statusLine}</div>
          <div class="r-sub">${fmtSyncDate(DB.meta.lastSyncAt)}${DB.meta.lastSyncMessage?(' · '+DB.meta.lastSyncMessage):''}</div>
        </div>
      </div>
      ${pendDel>0?`<div class="alert warn"><span class="a-icon">●</span><span><b>${pendDel} eliminación(es)</b> pendientes. Se subirán automáticamente cuando haya conexión.</span></div>`:''}
      <button class="btn btn-primary" data-action="do-sync-push" ${(!configured||syncBusy)?'disabled':''}>${syncBusy?'Sincronizando…':'Sincronizar ahora'}</button>
    </div>

    <div class="card">
      <div class="section-label">Restaurar (teléfono nuevo)</div>
      <p style="font-size:12.5px;color:var(--text-dim);line-height:1.5;margin:0 0 10px;">
        Solo si este teléfono está vacío y quieres traer lo que ya respaldaste antes.
        <b>Esto reemplaza</b> lo que haya aquí.
      </p>
      <button class="btn btn-danger" data-action="confirm-sync-pull" ${(!configured||syncBusy)?'disabled':''}>${syncBusy?'Restaurando…':'⬇ Restaurar desde la nube'}</button>
    </div>
  `;
}

/* ============================================================
   MANEJADOR GLOBAL DE ACCIONES (delegación de eventos)
   Un solo punto de entrada para todos los clics de la app.
   Si necesitas añadir un botón nuevo: ponle data-action="..."
   en el HTML y agrega un caso aquí. No hace falta wiring aparte.
   ============================================================ */
function handleAction(action, el, ev){
  const id = el.dataset.id;
  switch(action){
    // Viajes
    case 'new-trip': openTripForm(); break;
    case 'edit-trip': openTripForm(id); break;
    case 'save-trip': saveTripFromForm(); break;
    case 'delete-trip': confirmDeleteTrip(id); break;
    case 'do-delete-trip': deleteTrip(id); break;
    case 'trip-serv-add': tripServAdd(); break;
    case 'trip-serv-remove': tripServRemove(Number(el.dataset.idx)); break;
    case 'toggle-carguero-pagado': toggleCargueroPagado(id); break;

    // Gastos
    case 'new-expense': openExpenseForm(); break;
    case 'edit-expense': openExpenseForm(id); break;
    case 'save-expense': saveExpenseFromForm(); break;
    case 'delete-expense': confirmDeleteExpense(id); break;
    case 'do-delete-expense': deleteExpense(id); break;
    case 'cactus-add-category': cactusAddCategory(); break;

    // Caja
    case 'new-transfer': openTransferForm(); break;
    case 'edit-transfer': openTransferForm(id); break;
    case 'save-transfer': saveTransferFromForm(); break;
    case 'delete-transfer': confirmDeleteTransfer(id); break;
    case 'do-delete-transfer': deleteTransfer(id); break;
    case 'new-comision': openComisionForm(); break;

    // Productores
    case 'new-producer': openProducerForm(); break;
    case 'edit-producer': openProducerForm(id); break;
    case 'save-producer': saveProducerFromForm(); break;
    case 'delete-producer': confirmDeleteProducer(id); break;
    case 'do-delete-producer': deleteProducer(id); break;
    case 'view-producer': setView('productor-detalle', id); break;

    // Compromisos / deudas
    case 'new-commitment': openCommitmentForm(); break;
    case 'new-commitment-template': newCommitmentFromTemplate(Number(el.dataset.idx)); break;
    case 'edit-commitment': openCommitmentForm(id); break;
    case 'save-commitment': saveCommitmentFromForm(); break;
    case 'delete-commitment': confirmDeleteCommitment(id); break;
    case 'do-delete-commitment': deleteCommitment(id); break;
    case 'mark-commitment-paid': openPayCommitmentForm(id); break;
    case 'confirm-pay-commitment': confirmPayCommitment(); break;

    // Mantenimiento
    case 'new-maint': openMaintForm(); break;
    case 'edit-maint': openMaintForm(id); break;
    case 'save-maint': saveMaintFromForm(); break;
    case 'delete-maint': confirmDeleteMaint(id); break;
    case 'do-delete-maint': deleteMaint(id); break;
    case 'register-maint-done': registerMaintDone(id); break;

    // Reportes
    case 'reports-tab': setReportsTab(el.dataset.tab); break;
    case 'cierre-prev': shiftCierreMes(-1); break;
    case 'cierre-next': shiftCierreMes(1); break;

    // Configuración
    case 'cat-add': catAdd(el.dataset.cat); break;
    case 'cat-delete': catDelete(el.dataset.cat, el.dataset.value); break;
    case 'toggle-expense-grupo': toggleExpenseGrupo(el.dataset.value); break;
    case 'toggle-expense-tipo': toggleExpenseTipo(el.dataset.value); break;
    case 'save-alert-settings': saveAlertSettings(); break;
    case 'export-json': exportJSON(); break;
    case 'export-csv': exportCSV(); break;
    case 'set-pin': openSetPin(); break;
    case 'remove-pin': openRemovePin(); break;

    // Respaldo en la nube
    case 'do-sync-push': doSyncPush(); break;
    case 'confirm-sync-pull': confirmSyncPull(); break;
    case 'do-sync-pull': closeModal(); doSyncPull(); break;

    // Más / navegación
    case 'goto': setView(el.dataset.view); break;
    case 'go-back': setView(el.dataset.back || 'mas'); break;

    // Contacto
    case 'call': window.location.href = 'tel:'+el.dataset.phone; break;
    case 'sms': window.location.href = 'sms:'+el.dataset.phone; break;

    // Modales / pin
    case 'close-modal': closeModal(); break;
    case 'pin-digit': pinDigit(el.dataset.digit); break;
    case 'pin-back': pinBack(); break;
  }
}
document.addEventListener('click', function(ev){
  const el = ev.target.closest('[data-action]');
  if (!el) return;
  handleAction(el.dataset.action, el, ev);
});

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
